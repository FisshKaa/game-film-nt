// Разбор ссылки на YouTube → {id, start(сек)} или null
// Загружает YouTube IFrame API один раз; резолвится, когда доступен YT.Player
let __ytApiPromise = null;
function ensureYTApi(){
  if(window.YT && window.YT.Player) return Promise.resolve();
  if(__ytApiPromise) return __ytApiPromise;
  __ytApiPromise = new Promise(resolve=>{
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = ()=>{ if(typeof prev==='function'){ try{ prev(); }catch(e){} } resolve(); };
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  });
  return __ytApiPromise;
}
function parseYouTube(url){
  if(!url) return null;
  let s = url.trim();
  if(!/^https?:\/\//i.test(s)) s = 'https://' + s;
  try{
    const u = new URL(s);
    let id = '';
    if(u.hostname.includes('youtu.be')) id = u.pathname.slice(1);
    else if(u.searchParams.get('v')) id = u.searchParams.get('v');
    else if(u.pathname.includes('/embed/')) id = u.pathname.split('/embed/')[1];
    else if(u.pathname.includes('/shorts/')) id = u.pathname.split('/shorts/')[1];
    id = (id||'').split(/[/?&#]/)[0];
    if(!id) return null;
    let start = 0;
    const t = u.searchParams.get('t') || u.searchParams.get('start');
    if(t){
      if(/^\d+$/.test(t)) start = parseInt(t);
      else { const h=t.match(/(\d+)h/), m=t.match(/(\d+)m/), sec=t.match(/(\d+)s/);
        start = (h?+h[1]*3600:0)+(m?+m[1]*60:0)+(sec?+sec[1]:0); }
    }
    return { id, start };
  }catch(e){ return null; }
}

// Точка на окружности: угол в градусах от верха, по часовой стрелке
function wheelPolar(cx, cy, r, deg){
  const t = deg * Math.PI / 180;
  return { x: cx + r*Math.sin(t), y: cy - r*Math.cos(t) };
}

function truncTitle(s, n){ s = s || ''; return s.length > n ? s.slice(0, n-1) + '…' : s; }

// Строит SVG-колесо: по сегменту на игру из пула
function buildWheelSVG(pool){
  const N = pool.length;
  const cx = 150, cy = 150, R = 142, labelR = 92;
  if(N === 1){
    const g = pool[0];
    return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="${statusColor(g.status)}" stroke="var(--ink)" stroke-width="2"/>
      <text x="${cx}" y="${cy-40}" text-anchor="middle" font-size="13" font-family="'Hanken Grotesk',sans-serif" font-weight="700" fill="#12121a">${esc(truncTitle(g.title,16))}</text>
      <circle cx="${cx}" cy="${cy}" r="17" fill="var(--ink2)" stroke="var(--accent)" stroke-width="2"/>
    </svg>`;
  }
  const seg = 360 / N;
  let paths = '', labels = '';
  for(let i=0;i<N;i++){
    const a0 = i*seg, a1 = (i+1)*seg;
    const p0 = wheelPolar(cx,cy,R,a0), p1 = wheelPolar(cx,cy,R,a1);
    const large = seg > 180 ? 1 : 0;
    const g = pool[i];
    const col = statusColor(g.status);
    paths += `<path d="M${cx} ${cy} L${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A${R} ${R} 0 ${large} 1 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} Z" fill="${col}" stroke="var(--ink)" stroke-width="1.5"/>`;
    const mid = a0 + seg/2;
    const lp = wheelPolar(cx,cy,labelR,mid);
    let rot = mid; if(mid > 90 && mid < 270) rot += 180;   // переворот подписи в нижней половине
    const fs = N > 18 ? 8 : (N > 12 ? 9.5 : 11);
    const maxCh = N > 18 ? 7 : (N > 12 ? 10 : 14);
    labels += `<text x="${lp.x.toFixed(2)}" y="${lp.y.toFixed(2)}" transform="rotate(${rot.toFixed(1)} ${lp.x.toFixed(2)} ${lp.y.toFixed(2)})" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" font-family="'Hanken Grotesk',sans-serif" font-weight="600" fill="#12121a">${esc(truncTitle(g.title, maxCh))}</text>`;
  }
  return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--ink2)"/>
    ${paths}${labels}
    <circle cx="${cx}" cy="${cy}" r="17" fill="var(--ink2)" stroke="var(--accent)" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="var(--accent)"/>
  </svg>`;
}

// Три колонки: 0→вниз, 1→вверх, 2→вниз. Крутится spinTime секунд, потом поочерёдный стоп за 5 сек.
function beginSlotSpin(pool, winner, secs, done){
  const CELL_H = 76, GAP = 6, STRIDE = CELL_H + GAP;
  const dirs = ['down','up','down'];
  // Фаза 1: бесконечное вращение через CSS animation на каждом треке
  // Фаза 2: через spinTime → плавный доезд до победителя по очереди
  const spinTime = Math.max(1, secs - 5);   // время свободного вращения
  const stopDelay = [0, 1.5, 3.0];          // задержка начала торможения каждого барабана (сумма ≤ 5с)
  const stopDur = 1.8;                       // длительность торможения одного барабана

  const N = pool.length;
  const total = 60;
  const winCell = 40;

  // Строим треки и запускаем бесконечное вращение через быстрый JS-loop
  const tracks = [];
  dirs.forEach((dir, i)=>{
    const reel = document.getElementById('slotR'+i);
    const tr = reel ? reel.querySelector('.slot-track') : null;
    if(!tr){ tracks.push(null); return; }

    // Строим ленту: много случайных + победитель на winCell
    let items = '';
    for(let k=0;k<total;k++) items += slotCellHTML(k===winCell ? winner : pool[Math.floor(Math.random()*N)]);
    tr.style.transition = 'none';
    tr.innerHTML = items;
    void tr.getBoundingClientRect();

    // Стартуем с позиции «начало» и гоним в нужную сторону через requestAnimationFrame
    // Победитель пока не нужен — просто мотаем ленту туда-сюда
    // Реализуем как быстрое промежуточное позиционирование без CSS transition
    const speed = (dir==='down' ? 1 : -1) * 3; // пикселей за кадр (~180px/s при 60fps)
    let pos = 0;
    const maxPos = (total - 3) * STRIDE; // граница прокрутки
    let rafId = null;
    let stopped = false;

    function loop(){
      if(stopped) return;
      pos += speed;
      if(pos < 0) pos = maxPos;
      if(pos > maxPos) pos = 0;
      tr.style.transform = `translateY(${-pos}px)`;
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);

    // Функция остановки: плавно доезжает до победителя
    const stop = (delay)=>setTimeout(()=>{
      stopped = true;
      if(rafId) cancelAnimationFrame(rafId);
      // Считаем куда ехать: победитель на winCell, центральная строка
      const finalTy = -(winCell * STRIDE - STRIDE);
      tr.style.transition = 'none';
      void tr.getBoundingClientRect();
      requestAnimationFrame(()=>{
        tr.style.transition = `transform ${stopDur}s cubic-bezier(0.08, 0.82, 0.12, 1)`;
        tr.style.transform = `translateY(${finalTy}px)`;
      });
      if(i === 2){
        const h = ()=>{ tr.removeEventListener('transitionend', h); done(); };
        tr.addEventListener('transitionend', h);
      }
    }, (spinTime + stopDelay[i]) * 1000);

    tracks.push({ tr, stop });
  });

  // Запускаем остановки по очереди
  tracks.forEach((t, i)=>{ if(t) t.stop(0); });
}

      <input type="text" id="musicUrl" placeholder="Ссылка на YouTube для музыки (необязательно)" value="${esc(musicUrl)}" autocomplete="off">
    </div>
    <div class="rl-vol">
      <span>🔈</span>
      <input type="range" id="rlVol" min="0" max="100" step="1" value="${rlVolume}">
      <span class="rl-vol-num" id="rlVolNum">${rlVolume}%</span>
    </div>
    ${mode==='wheel' ? `<div class="rl-center-pick" id="centerPick">
      <span class="lbl">Центр</span>
      ${CENTER_EMOJI.map(e=>`<button class="cbtn ${centerCfg.type==='emoji'&&centerCfg.value===e?'sel':''}" data-type="emoji" data-val="${e}">${e}</button>`).join('')}
      <button class="cbtn ${centerCfg.type==='shape'?'sel':''}" data-type="shape" title="Вращающаяся фигура"><span class="mini-shape"></span></button>
      <button class="cbtn ${centerCfg.type==='image'?'sel':''}" data-type="image" title="Своя GIF/картинка">🔗</button>
      <button class="cbtn ${centerCfg.type==='none'?'sel':''}" data-type="none" title="Пусто">✕</button>
      <div class="center-img-row ${centerCfg.type==='image'?'show':''}" id="centerImgRow">
        <input type="text" id="centerImg" placeholder="Ссылка на GIF или картинку" value="${centerCfg.type==='image'?esc(centerCfg.value||''):''}" autocomplete="off">
      </div>
    </div>` : ''}
    ${mode==='wheel'
      ? `<div class="wheel-wrap${rlSkinCls}" id="wheelWrap">
          <div class="wheel-pointer"></div>
          <div class="wheel-rot" id="wheelRot"></div>
          <div class="wheel-center" id="wheelCenter"></div>
        </div>`
      : mode==='slot'
      ? `<div class="slot-wrap${rlSkinCls}" id="wheelWrap">
          <div class="slot-line"></div>
          <div class="slot-col"><div class="slot-arrow">↓</div><div class="slot-reel" id="slotR0"><div class="slot-track"></div></div></div>
          <div class="slot-col"><div class="slot-arrow">↑</div><div class="slot-reel" id="slotR1"><div class="slot-track"></div></div></div>
          <div class="slot-col"><div class="slot-arrow">↓</div><div class="slot-reel" id="slotR2"><div class="slot-track"></div></div></div>
        </div>`
      : `<div class="strip-wrap${rlSkinCls}" id="wheelWrap" data-axis="${axis}">
          <div class="strip-pointer"></div>
          <div class="strip-track" id="stripTrack"></div>
        </div>`
    }
    <div class="rl-result" id="rlResult"></div>
    <div class="form-actions">
      <button class="btn" id="spinBtn" style="flex:1">Крутить</button>
    </div>
    <div class="yt-host" id="ytHost"></div>
  `);

  const wheelRot = document.getElementById('wheelRot');
  const stripTrack = document.getElementById('stripTrack');
  const spinBtn = document.getElementById('spinBtn');
  const resultEl = document.getElementById('rlResult');
  const picksEl = document.getElementById('rlPicks');
  const secsInp = document.getElementById('spinSecs');
  const musicInp = document.getElementById('musicUrl');
  const ytHost = document.getElementById('ytHost');
  const centerEl = document.getElementById('wheelCenter');
  const centerPick = document.getElementById('centerPick');
  const centerImgRow = document.getElementById('centerImgRow');
  const centerImgInp = document.getElementById('centerImg');

  function renderCenter(){ if(centerEl) centerEl.innerHTML = centerInner(centerCfg); }

  if(centerPick){
    centerPick.querySelectorAll('.cbtn').forEach(b=>{
      b.addEventListener('click', ()=>{
        const type = b.dataset.type;
        if(type==='emoji') centerCfg = { type:'emoji', value:b.dataset.val };
        else if(type==='shape') centerCfg = { type:'shape' };
        else if(type==='none') centerCfg = { type:'none' };
        else if(type==='image') centerCfg = { type:'image', value:(centerImgInp.value.trim()||'') };
        centerPick.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        centerImgRow.classList.toggle('show', type==='image');
        saveCenterCfg(centerCfg); renderCenter();
      });
    });
    centerImgInp.addEventListener('input', ()=>{
      if(centerCfg.type==='image'){ centerCfg.value = centerImgInp.value.trim(); saveCenterCfg(centerCfg); renderCenter(); }
    });
  }

  musicInp.addEventListener('change', ()=>{ musicUrl = musicInp.value.trim(); saveMusicUrl(musicUrl); });
  const volInp = document.getElementById('rlVol');
  const volNum = document.getElementById('rlVolNum');
  if(volInp) volInp.addEventListener('input', ()=>{
    rlVolume = parseInt(volInp.value, 10) || 0;
    if(volNum) volNum.textContent = rlVolume + '%';
    if(ytPlayer && ytPlayer.setVolume){ try{ ytPlayer.setVolume(rlVolume); }catch(e){} }
    saveRlVolume(rlVolume);
  });

  let ytPlayer = null;
  // Запускает музыку; onPlaying вызывается, когда трек реально заиграл (нет ссылки — сразу)
  function startMusic(onPlaying){
    const yt = parseYouTube(musicInp.value);
    if(!yt){ ytHost.innerHTML=''; if(onPlaying) onPlaying(); return; }
    ytHost.innerHTML = '<div id="ytPlayer"></div>';
    let fired = false;
    const fire = ()=>{ if(fired) return; fired = true; if(onPlaying) onPlaying(); };
    ensureYTApi().then(()=>{
      try{
        ytPlayer = new YT.Player('ytPlayer', {
          videoId: yt.id,
          playerVars:{ autoplay:1, start:yt.start, controls:0, modestbranding:1, playsinline:1 },
          events:{
            onReady:(e)=>{ try{ e.target.setVolume(rlVolume); }catch(_){} },
            onStateChange:(e)=>{ if(e.data === YT.PlayerState.PLAYING){ try{ e.target.setVolume(rlVolume); }catch(_){} fire(); } },
            onError:()=>fire()
          }
        });
      }catch(e){ fire(); }
    });
  }
  function stopMusic(){ try{ if(ytPlayer && ytPlayer.destroy) ytPlayer.destroy(); }catch(e){} ytPlayer=null; ytHost.innerHTML=''; }

  const currentPool = ()=>games.filter(g=>enabled.has(g.status));

  function buildWheel(){
    const pool = currentPool();
    if(mode==='wheel'){
      wheelRot.innerHTML = pool.length
        ? buildWheelSVG(pool)
        : `<div class="wheel-empty">Выбери хотя бы один статус, чтобы собрать колесо</div>`;
    } else if(mode==='slot'){
      [0,1,2].forEach(i=>{
        const reel = document.getElementById('slotR'+i);
        const tr = reel && reel.querySelector('.slot-track');
        if(!tr) return;
        tr.style.transition='none'; tr.style.transform='translateY(0)';
        if(!pool.length){ tr.innerHTML=''; return; }
        let cells=''; for(let k=0;k<9;k++) cells += slotCellHTML(pool[Math.floor(Math.random()*pool.length)]);
        tr.innerHTML = cells;
      });
    } else {
      if(!pool.length){ stripTrack.innerHTML = ''; return; }
      let cells = '';
      for(let i=0;i<24;i++) cells += stripCellHTML(pool[Math.floor(Math.random()*pool.length)]);
      stripTrack.style.transition = 'none';
      stripTrack.style.transform = 'translate(0,0)';
      stripTrack.innerHTML = cells;
    }
  }

  // Анимация ленты: строит длинную ленту с победителем ближе к концу и подъезжает к указателю
  function beginStripSpin(pool, winner, secs){
    const N = pool.length;
    const total = Math.max(48, N*6);
    const winCell = total - 6;
    let items = '';
    for(let i=0;i<total;i++) items += stripCellHTML(i===winCell ? winner : pool[Math.floor(Math.random()*N)]);
    stripTrack.style.transition = 'none';
    stripTrack.style.transform = 'translate(0,0)';
    stripTrack.innerHTML = items;
    void stripTrack.offsetWidth; // reflow
    const gap = 8, pad = 8;
    const first = stripTrack.children[winCell] || stripTrack.children[0];
    const cellSize = axis==='x' ? first.offsetWidth : first.offsetHeight;
    const stride = cellSize + gap;
    const wrap = document.getElementById('wheelWrap');
    const viewport = axis==='x' ? wrap.clientWidth : wrap.clientHeight;
    const jitter = (Math.random()-0.5) * cellSize * 0.5;
    const offset = pad + winCell*stride + cellSize/2 - viewport/2 + jitter;
    requestAnimationFrame(()=>{
      stripTrack.style.transition = `transform ${secs}s cubic-bezier(0.12,0.7,0.08,1)`;
      stripTrack.style.transform = axis==='x' ? `translateX(${-offset}px)` : `translateY(${-offset}px)`;
    });
  }

  picksEl.querySelectorAll('.chip:not([disabled])').forEach(ch=>{
    ch.addEventListener('click', ()=>{
      if(spinning) return;
      const s = ch.dataset.st;
      if(enabled.has(s)) enabled.delete(s); else enabled.add(s);
      ch.classList.toggle('active', enabled.has(s));
      resultEl.innerHTML = '';
      buildWheel();
    });
  });

  function spin(){
    if(spinning) return;
    const pool = currentPool();
    if(pool.length === 0){ resultEl.innerHTML = `<div class="rl-hint">Выбери хотя бы один статус для розыгрыша.</div>`; return; }
    spinning = true; spinBtn.disabled = true; resultEl.innerHTML = '';

    let secs = parseFloat(secsInp.value);
    if(!isFinite(secs)) secs = 5;
    secs = Math.max(1, Math.min(240, secs));
    secsInp.value = secs;

    const N = pool.length;
    const winIdx = Math.floor(Math.random()*N);
    const winner = pool[winIdx];

    // Для барабана заранее считаем целевой угол
    if(mode==='wheel'){
      const seg = 360 / N;
      const center = winIdx*seg + seg/2;
      const jitter = (Math.random()-0.5) * seg * 0.7;
      const targetMod = (((-(center + jitter)) % 360) + 360) % 360;
      const curMod = ((rotation % 360) + 360) % 360;
      const turns = 6;
      const advance = turns*360 + (((targetMod - curMod) % 360) + 360) % 360;
      rotation += advance;
    }

    const beginSpin = ()=>{
      if(mode==='wheel'){
        if(centerEl) centerEl.classList.add('dancing');
        requestAnimationFrame(()=>{
          wheelRot.style.transition = `transform ${secs}s cubic-bezier(0.15,0.68,0.10,1)`;
          wheelRot.style.transform = `rotate(${rotation}deg)`;
        });
      } else if(mode==='slot'){
        beginSlotSpin(pool, winner, secs, finish);
      } else {
        beginStripSpin(pool, winner, secs);
      }
    };

    const finish = ()=>{
      stopMusic();
      if(centerEl) centerEl.classList.remove('dancing');
      spinning = false; spinBtn.disabled = false; spinBtn.textContent = 'Крутить снова';
      resultEl.innerHTML = `<div class="rl-win">
          <div class="rl-win-lab mono">Выпало</div>
          <div class="rl-win-name">${esc(winner.title)}</div>
          <div class="rl-win-meta">${esc([winner.genre, winner.status].filter(Boolean).join(' · '))}</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
            <button class="btn ghost sm" id="rlOpen">Открыть обзор</button>
            <button class="btn ghost sm" id="rlFriends">Обзоры друзей</button>
          </div>
          <div id="rlFriendsList"></div>
        </div>`;
      const ob = document.getElementById('rlOpen');
      if(ob) ob.addEventListener('click', ()=>openDetail(winner.id, games, false, openRoulette, '← Назад к рулетке'));
      const fbtn = document.getElementById('rlFriends');
      if(fbtn) fbtn.addEventListener('click', ()=>showFriendReviews(fbtn, winner.title));
      launchConfetti();   // конфетти теперь всегда
    };

    // Барабан и лента завершаются по transitionend; слот сам вызовет finish() после последней колонки
    if(mode==='wheel' || mode==='strip'){
      const animEl = (mode==='wheel') ? wheelRot : stripTrack;
      const onEnd = ()=>{ animEl.removeEventListener('transitionend', onEnd); finish(); };
      animEl.addEventListener('transitionend', onEnd);
    }

    const hasMusic = !!parseYouTube(musicInp.value);
    if(hasMusic){
      spinBtn.textContent = 'Ждём музыку…';
      let go = false;
      const fire = ()=>{ if(go) return; go = true; beginSpin(); };
      startMusic(fire);
      setTimeout(fire, 15000);   // фолбэк: если музыка не завелась за 15 c — крутим без синхронизации
    } else {
      startMusic();              // без ссылки просто очистит хост
      beginSpin();
    }
  }

  // Ищет игру по названию у всех опубликованных друзей и показывает их оценки/обзоры
  async function showFriendReviews(btn, title){
    const box = document.getElementById('rlFriendsList');
    if(!box) return;
    btn.disabled = true;
    box.innerHTML = `<div class="rl-hint">Ищу у друзей…</div>`;
    const profiles = await listProfiles();
    const norm = s => (s||'').trim().toLowerCase();
    const wt = norm(title);
    const matches = [];
    profiles.forEach(p=>{
      if(myHandle && p.handle===myHandle) return;         // не показываем собственный опубликованный профиль
      const g = (p.items||[]).find(x=>norm(x.title)===wt);
      if(g) matches.push({p, g});
    });
    btn.disabled = false;
    if(matches.length === 0){
      box.innerHTML = `<div class="rl-hint">Пока никто из друзей не добавлял «${esc(title)}».</div>`;
      return;
    }
    box.innerHTML = `<div class="fr-list">` + matches.map(({p,g})=>{
      const t = tierOf(g.score);
      return `<div class="fr-item">
        <div class="fr-top">
          <span class="fr-av">${esc(p.avatar||'🎮')}</span>
          <span class="fr-name">${esc(p.name||'Игрок')} <span class="fr-handle">@${esc(p.handle)}</span></span>
          <span class="fr-score" style="color:${t.color}">${g.score.toFixed(1)}</span>
        </div>
        ${g.status?`<div class="fr-meta">${esc(g.status)} · тир ${t.key}</div>`:''}
        <div class="fr-review ${g.review?'':'empty'}">${g.review?esc(g.review):'Без обзора'}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  spinBtn.addEventListener('click', spin);
  buildWheel();
  renderCenter();
}

function openPublish(){
  const suggested = myHandle || (profile.name||'player').toLowerCase().replace(/[^a-zа-я0-9_]+/gi,'_').slice(0,20);
  showModal(`
    <button class="close" onclick="__close()">×</button>
    <h3>Профиль и синхронизация</h3>
    <p class="comm-note">${esc(L().publishNote)} Ник и PIN также работают как вход: открой это же приложение на телефоне или в другом браузере, введи те же ник и PIN — и заберёшь сюда свой профиль.</p>
    <label>Ник</label>
    <input type="text" id="fHandle" value="${esc(suggested)}" maxlength="20" placeholder="напр. gamer_max">
    <label>PIN (придумай, минимум 4 символа — понадобится для входа на других устройствах)</label>
    <input type="password" id="fPin" maxlength="30" placeholder="••••" autocomplete="off">
    <div class="err" id="pubErr"></div>
    <div class="form-actions">
      ${myHandle?`<button class="btn ghost" id="unpubBtn" style="color:var(--s)">Убрать из витрины</button>`:`<button class="btn ghost" onclick="__close()">Отмена</button>`}
      <button class="btn" id="doPublish">${myHandle?'Обновить':'Опубликовать / Войти'}</button>
    </div>
  `);
  document.getElementById('doPublish').addEventListener('click', async ()=>{
    const raw = document.getElementById('fHandle').value.trim().replace(/\s+/g,'_');
    const pin = document.getElementById('fPin').value.trim();
    const err = document.getElementById('pubErr');
    const btn = document.getElementById('doPublish');
    err.textContent = '';
    if(!raw){ err.textContent='Впиши ник.'; return; }
    if(pin.length < 4){ err.textContent='PIN должен быть не короче 4 символов.'; return; }
    btn.disabled = true; btn.textContent = 'Проверяю…';
    try{
      await claimHandle(raw, pin);
      const oldHandle = myHandle;
      myHandle = raw; await saveHandle(myHandle); await saveVaultPin(pin);
      if(oldHandle && oldHandle !== raw){ try{ await unpublishProfile(oldHandle); }catch(e){} }
      const pulled = await syncFromCloud(domain);
      if(!pulled){ await publishProfile(raw); await persistCoinBalance(coinBalance); }
      closeModal(); render(); loadLeaderboard();
    }catch(e){
      const msg = (e && e.message) || '';
      if(msg.includes('wrong_pin')) err.textContent = 'Неверный PIN для этого ника. Если это не твой ник — выбери другой.';
      else if(msg.includes('pin_too_short')) err.textContent = 'PIN должен быть не короче 4 символов.';
      else err.textContent = 'Не удалось сохранить. Попробуй ещё раз.';
      btn.disabled = false; btn.textContent = myHandle?'Обновить':'Опубликовать / Войти';
    }
  });
  armButton(document.getElementById('unpubBtn'), 'Точно убрать?', async ()=>{
    await unpublishProfile(myHandle); myHandle=''; await saveHandle(''); await clearVaultPin(); closeModal(); render(); loadLeaderboard();
  });
}

/* ---------------- Modal helpers ---------------- */
function showModal(inner, modalClass){ modal.className = 'modal' + (modalClass?(' '+modalClass):''); modal.innerHTML = inner; overlay.classList.add('open'); }
function closeModal(){ overlay.classList.remove('open'); modal.innerHTML=''; modal.className='modal'; }
// Клик по тёмному фону закрывает окно ТОЛЬКО в профиле друга (fp-modal). В остальных — только крестик/назад.
overlay.addEventListener('click', e=>{ if(e.target===overlay && modal.classList.contains('fp-modal')) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// Двухшаговое подтверждение на кнопке (замена системного confirm, который блокируется в песочнице).
// Первый клик «взводит» кнопку, второй в течение 3.5с выполняет action.
function armButton(btn, confirmText, action){
  if(!btn) return;
  let armed = false, timer;
  const orig = btn.textContent;
  const reset = ()=>{ armed=false; btn.textContent=orig; btn.classList.remove('armed'); };
  btn.addEventListener('click', async ()=>{
    if(!armed){
      armed = true; btn.textContent = confirmText; btn.classList.add('armed');
      timer = setTimeout(reset, 3500);
      return;
    }
    clearTimeout(timer);
    await action();
  });
}

  const scoreInp = document.getElementById('fScore');

    const v = parseFloat(scoreInp.value);
    const t = tierOf(v);
    badge.innerHTML = `<span>${v.toFixed(1)}</span><span class="tl" style="background:${tierColorVar(t.key)}">${t.key}</span>`;
  }
  scoreInp.addEventListener('input', upd); upd();

  // ---- cover controls ----
  let currentCover = g && g.cover ? g.cover : '';
  let coverMeta = g ? { tmdbId:g.tmdbId||null, wikiUrl:g.wikiUrl||null, qid:g.qid||null } : { tmdbId:null, wikiUrl:null, qid:null };
  const prev = document.getElementById('coverPrev');
  const urlInp = document.getElementById('fCoverUrl');
  const fileInp = document.getElementById('fCoverFile');
  const optsBox = document.getElementById('coverOptions');
  const genreInp = document.getElementById('fGenre');
  function drawPrev(){
    if(currentCover){
      prev.innerHTML = `<img src="${esc(currentCover)}" alt="" onerror="this.parentNode.textContent='ссылка не открылась'">`;
    } else { prev.textContent = 'нет обложки'; }
  }
  if(currentCover && !currentCover.startsWith('data:')) urlInp.value = currentCover;
  drawPrev();
  urlInp.addEventListener('input', ()=>{ currentCover = urlInp.value.trim(); drawPrev(); });
  document.getElementById('uploadBtn').addEventListener('click', ()=>fileInp.click());
  document.getElementById('clearCover').addEventListener('click', ()=>{
    currentCover=''; urlInp.value=''; coverMeta={ tmdbId:null, wikiUrl:null, qid:null };
    optsBox.hidden = true; optsBox.innerHTML=''; drawPrev();
  });
  document.getElementById('autoCover').addEventListener('click', async (e)=>{
    const t = document.getElementById('fTitle').value.trim();
    if(!t){ prev.textContent = 'сначала впиши название'; return; }
    const btn = e.currentTarget; const old = btn.textContent;
    btn.disabled = true; btn.textContent = '…';
    optsBox.hidden = false; optsBox.innerHTML = '<div class="cover-opt-empty">ищу варианты…</div>';
    let opts = [];
    try{
      if(domain === 'movies'){
        // Для фильмов TMDB — основной источник, Википедия — доп. вариант (особенно когда
        // TMDB недоступен у части пользователей). Показываем оба списка вместе.
        const [tmdbOpts, wikiOpts] = await Promise.all([
          fetchMovieOptions(t).catch(()=>[]),
          fetchGameOptions(t).catch(()=>[])
        ]);
        opts = [...tmdbOpts, ...wikiOpts];
      } else {
        opts = await fetchGameOptions(t);
      }
    }catch(err){}
    if(!opts.length){
      optsBox.innerHTML = '<div class="cover-opt-empty">Ничего не нашлось — впиши название точнее или задай обложку вручную.</div>';
    } else {
      optsBox.innerHTML = opts.map((o,i)=>{
        const cap = [o.title, o.year].filter(Boolean).join(' · ');
        const srcTag = (domain==='movies' && o.source) ? (o.source==='wiki' ? '📖 ' : '🎬 ') : '';
        return `<div class="cover-opt" data-i="${i}"><img src="${esc(o.thumb||o.cover)}" alt="" loading="lazy"
          onerror="this.parentNode.style.display='none'"><div class="co-cap">${srcTag}${esc(cap)||'—'}</div></div>`;
      }).join('');
      optsBox.querySelectorAll('.cover-opt').forEach(el=>{
        el.addEventListener('click', ()=>{
          const o = opts[+el.dataset.i];
          currentCover = o.cover;
          coverMeta = { tmdbId:o.tmdbId||null, wikiUrl:o.wikiUrl||null, qid:o.qid||null };
          urlInp.value = '';
          if(genreInp && !genreInp.value.trim() && o.genre) genreInp.value = o.genre;
          optsBox.querySelectorAll('.cover-opt').forEach(x=>x.classList.remove('sel'));
          el.classList.add('sel');
          drawPrev();
        });
      });
    }
    btn.disabled = false; btn.textContent = old;
  });
  fileInp.addEventListener('change', async ()=>{
    const f = fileInp.files[0]; if(!f) return;
    prev.textContent = 'обработка…';
    try{ currentCover = await downscaleImage(f); urlInp.value=''; drawPrev(); }
    catch(e){ prev.textContent='не удалось загрузить'; }
  });

  document.getElementById('saveGame').addEventListener('click', ()=>submitForm(editId, ()=>({ cover: currentCover, ...coverMeta })));
}

async function submitForm(editId, getData){
  const title = document.getElementById('fTitle').value.trim();
  const err = document.getElementById('formErr');
  if(!title){ err.textContent='Впиши название.'; return; }
  const cd = getData ? getData() : {};
  const data = {
    title,
    genre: document.getElementById('fGenre').value.trim(),
    status: document.getElementById('fStatus').value,
    score: parseFloat(document.getElementById('fScore').value),
    review: document.getElementById('fReview').value.trim(),
    cover: cd.cover || '',
  };
  if(cd.tmdbId) data.tmdbId = cd.tmdbId;
  if(cd.wikiUrl) data.wikiUrl = cd.wikiUrl;
  if(cd.qid) data.qid = cd.qid;

  // Автопоиск дозаполняет только то, чего не хватает (обложка/ссылка/id/жанр).
  // Явно выбранную обложку и её данные не трогаем.
  {
    const saveBtn = document.getElementById('saveGame');
    const prevLabel = saveBtn ? saveBtn.textContent : '';
    if(domain === 'movies'){
      if(!data.cover || !data.tmdbId || !data.genre){
        if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Ищу данные…'; }
        const r = await fetchMovieCover(title);
        if(r){
          if(!data.cover && r.cover) data.cover = r.cover;
          if(!data.tmdbId && r.tmdbId) data.tmdbId = r.tmdbId;
          if(!data.genre && r.genre) data.genre = r.genre;
        }
        // TMDB иногда недоступен (заблокирован у части пользователей) или не находит постер —
        // в этом случае берём обложку из Википедии как запасной источник.
        if(!data.cover){
          const rw = await fetchGameCover(title);
          if(rw && rw.cover){
            data.cover = rw.cover;
            if(!data.wikiUrl) data.wikiUrl = rw.wikiUrl;
            if(!data.qid) data.qid = rw.qid;
            if(!data.genre && rw.qid){ const gnr = await fetchWikidataGenre(rw.qid); if(gnr) data.genre = gnr; }
          }
        }
      }
    } else {
      if(!data.cover || !(data.wikiUrl || data.qid) || !data.genre){
        if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Ищу данные…'; }
        let r = null;
        if(!data.cover || !(data.wikiUrl || data.qid)) r = await fetchGameCover(title);
        if(r){
          if(!data.cover && r.cover) data.cover = r.cover;
          if(!data.wikiUrl && r.wikiUrl) data.wikiUrl = r.wikiUrl;
          if(!data.qid && r.qid) data.qid = r.qid;
        }
        if(!data.genre){
          const qid = data.qid || (r && r.qid);
          if(qid){ const gnr = await fetchWikidataGenre(qid); if(gnr) data.genre = gnr; }
        }
      }
    }
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = prevLabel; }
  }
  let item;
  if(editId){
    const i = games.findIndex(x=>x.id===editId);
    if(i>-1){ games[i] = {...games[i], ...data}; item = games[i]; }
  } else {
    item = { id:'g_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), ...data, added:Date.now() };
    games.push(item);
  }
  // Награда: +100 Добрикоин за первый обзор к завершённому тайтлу.
  // Не более одной выплаты за 24 часа (защита от фарма через удаление/создание карточек).
  if(completedStatuses().includes(item.status) && item.review && !item.coinRewarded){
    if(await canClaimReviewReward()){
      item.coinRewarded = true;
      await addCoins(COIN_REVIEW_REWARD);
      await markReviewRewardClaimed();
    }
  }
  await saveGames(games);
  closeModal(); render();
}

// Уменьшает загруженное изображение до компактного размера (для хранилища)
function downscaleImage(file, maxW=420){
  return new Promise((res,rej)=>{
    const rd = new FileReader();
    rd.onerror = rej;
    rd.onload = ()=>{
      const img = new Image();
      img.onerror = rej;
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        try{ res(c.toDataURL('image/jpeg',0.72)); }catch(e){ rej(e); }
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(file);
  });
}

/* ---------------- Реакции на обзоры ---------------- */
const REACTION_EMOJIS = ['❤️','🔥','😂','😮','👏'];

// Загружает реакции к конкретному обзору (domain + owner + item_id)
async function loadReactions(owner, itemId){
  try{
    const { data, error } = await sb.from('reactions')
      .select('emoji,reactor')
      .eq('domain', domain).eq('owner', owner).eq('item_id', itemId);
    if(error) throw error;
    return data || [];
  }catch(e){ return []; }
}

// Пакетно загружает реакции для всех карточек на доске и вставляет пилюли.
// el — контейнер доски, owner — ник владельца (null = мой).
async function loadBoardReactions(el, owner){
  const cells = el.querySelectorAll('.card-rx[data-item-id]');
  if(!cells.length) return;
  const effectiveOwner = owner || myHandle;
  if(!effectiveOwner) return;
  const itemIds = [...cells].map(c=>c.dataset.itemId);
  if(!itemIds.length) return;
  try{
    // Один запрос на все item_id сразу
    const { data } = await sb.from('reactions').select('item_id,emoji')
      .eq('domain', domain).eq('owner', effectiveOwner)
      .in('item_id', itemIds);
    // Группируем по item_id
    const map = {};
    (data||[]).forEach(r=>{
      if(!map[r.item_id]) map[r.item_id] = {};
      map[r.item_id][r.emoji] = (map[r.item_id][r.emoji]||0) + 1;
    });
    cells.forEach(cell=>{
      const counts = map[cell.dataset.itemId] || {};
      const pills = REACTION_EMOJIS.filter(e=>counts[e]>0)
        .map(e=>`<span class="rx-pill">${e}<b>${counts[e]}</b></span>`).join('');
      cell.innerHTML = pills;
    });
  }catch(e){}
}

// Ставит или убирает реакцию текущего пользователя
async function toggleReaction(owner, itemId, emoji){
  if(!myHandle) return null;
  const id = `${domain}:${owner}:${itemId}:${myHandle}`;
  try{
    // Проверяем, есть ли уже такая реакция
    const { data: existing } = await sb.from('reactions')
      .select('emoji').eq('id', id).maybeSingle();
    if(existing && existing.emoji === emoji){
      // Убираем
      await sb.from('reactions').delete().eq('id', id);
      return null;
    } else {
      // Ставим (upsert — заменяет если уже стояла другая)
      await sb.from('reactions').upsert({ id, domain, owner, item_id: itemId, reactor: myHandle, emoji });
      return emoji;
    }
  }catch(e){ console.error('reaction failed', e); return null; }
}

// Рендерит блок реакций в обзоре. owner=null → мой обзор (ник = myHandle)
async function renderReactions(container, owner, itemId, isOwn){
  const effectiveOwner = owner || myHandle || '';
  if(!effectiveOwner){ container.innerHTML = ''; return; }

  container.innerHTML = '<div class="rx-loading">…</div>';
  const rows = await loadReactions(effectiveOwner, itemId);

  const counts = {};
  const myReaction = {};
  REACTION_EMOJIS.forEach(e=>{ counts[e]=0; myReaction[e]=false; });
  rows.forEach(r=>{
    if(counts[r.emoji]!==undefined) counts[r.emoji]++;
    if(r.reactor === myHandle) myReaction[r.emoji] = true;
  });

  const canReact = !!myHandle && !isOwn;

  container.innerHTML = `<div class="rx-wrap">
    ${REACTION_EMOJIS.map(e=>`
      <button class="rx-btn${myReaction[e]?' rx-active':''}" data-emoji="${e}" ${!canReact?'disabled':''} title="${canReact?'Поставить реакцию':''}">
        ${e}${counts[e]>0?`<span class="rx-cnt">${counts[e]}</span>`:''}
      </button>`).join('')}
    ${!myHandle?`<span class="rx-hint">Опубликуй профиль, чтобы ставить реакции</span>`:''}
    ${isOwn?`<span class="rx-hint">Нельзя реагировать на свой обзор</span>`:''}
  </div>`;

  if(canReact){
    container.querySelectorAll('.rx-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        btn.disabled = true;
        await toggleReaction(effectiveOwner, itemId, btn.dataset.emoji);
        await renderReactions(container, owner, itemId, isOwn);
      });
    });
  }
}

function collageHTML(coll, size){
  const szStyle = size ? `style="width:${size}px;height:${size}px;flex-shrink:0"` : '';
  const szClass = size ? 'coll-detail-collage' : '';
  // Если задана своя обложка — используем её
  if(coll.cover){
    return `<div class="coll-cover1 ${szClass}" ${szStyle}><img src="${esc(coll.cover)}" alt="" onerror="this.closest('.coll-cover1').innerHTML='${domain==='movies'?'🎬':'🎮'}'"></div>`;
  }
  const items = (coll.itemIds||[])
    .map(id=>games.find(g=>g.id===id)).filter(Boolean);
  const covers = items.map(g=>g.cover).filter(Boolean).slice(0,4);
  if(!covers.length){
    return `<div class="coll-nocover ${szClass}" ${szStyle}>${domain==='movies'?'🎬':'🎮'}</div>`;
  }
  if(covers.length===1){
    return `<div class="coll-cover1 ${szClass}" ${szStyle}><img src="${esc(covers[0])}" alt=""></div>`;
  }
  const cells = covers.map(c=>`<img src="${esc(c)}" alt="" onerror="this.style.display='none'">`).join('');
  return `<div class="coll-collage coll-n${covers.length} ${szClass}" ${szStyle}>${cells}</div>`;
}

// Средняя оценка коллекции
function collAvg(coll){
  const scored = (coll.itemIds||[])
    .map(id=>games.find(g=>g.id===id)).filter(g=>g&&completedStatuses().includes(g.status));
  if(!scored.length) return null;
  return scored.reduce((s,g)=>s+g.score,0)/scored.length;
}

// HTML одной карточки коллекции
function collCardHTML(coll, readonly){
  const avg = collAvg(coll);
  const t = avg!==null ? tierOf(avg) : null;
  const cnt = (coll.itemIds||[]).length;
  return `<div class="coll-card" data-coll-id="${esc(coll.id)}" data-ro="${readonly?1:0}">
    ${collageHTML(coll)}

      <div class="coll-card-title">${esc(coll.title)}</div>
      <div class="coll-card-meta">
        ${t?`<span class="coll-score" style="color:${t.color}">${avg.toFixed(1)}</span>`:''}
        <span class="coll-cnt">${cnt} ${domain==='movies'?'фильм':'игр'}${cnt===1?'а':cnt<5?'ы':''}</span>

// Рендерит сетку коллекций в el
function renderCollections(el, colls, readonly, query){
  if(!el) return;
  const filtered = query ? colls.filter(c=>c.title.toLowerCase().includes(query.toLowerCase())) : colls;
  if(!colls.length){
    el.innerHTML = `<div class="empty-all" style="padding:28px 20px"><b>Пока нет коллекций</b>${readonly?'У этого пользователя нет коллекций.':'Собери серию или подборку — нажми «+ Новая коллекция».'}</div>`;

  const collOptsBox = document.getElementById('collOptsBox');
  document.getElementById('collAutoBtn').addEventListener('click', async (e)=>{
    const t = document.getElementById('collTitle').value.trim();
    if(!t){ collPrev.textContent = 'сначала впиши название'; return; }
    const btn = e.currentTarget; const old = btn.textContent;
    btn.disabled = true; btn.textContent = '…';
    collOptsBox.hidden = false; collOptsBox.innerHTML = '<div class="cover-opt-empty">ищу варианты…</div>';
    let opts = [];
    try{
      if(domain === 'movies'){
        const [tmdbOpts, wikiOpts] = await Promise.all([
          fetchMovieOptions(t).catch(()=>[]),
          fetchGameOptions(t).catch(()=>[])
        ]);
        opts = [...tmdbOpts, ...wikiOpts];
      } else {
        opts = await fetchGameOptions(t);
      }
    }catch(err){}
    if(!opts.length){
      collOptsBox.innerHTML = '<div class="cover-opt-empty">Ничего не нашлось — впиши название точнее или задай обложку вручную.</div>';
    } else {
      collOptsBox.innerHTML = opts.map((o,i)=>{
        const cap = [o.title, o.year].filter(Boolean).join(' · ');
        const srcTag = (domain==='movies' && o.source) ? (o.source==='wiki' ? '📖 ' : '🎬 ') : '';
        return `<div class="cover-opt" data-i="${i}"><img src="${esc(o.thumb||o.cover)}" alt="" loading="lazy"
          onerror="this.parentNode.style.display='none'"><div class="co-cap">${srcTag}${esc(cap)||'—'}</div></div>`;
      }).join('');
      collOptsBox.querySelectorAll('.cover-opt').forEach(el=>{
        el.addEventListener('click', ()=>{
          const o = opts[+el.dataset.i];
          collCover = o.cover;
          collUrlInp.value = '';
          collOptsBox.querySelectorAll('.cover-opt').forEach(x=>x.classList.remove('sel'));
          el.classList.add('sel');
          drawCollPrev();
        });
      });
    }
    btn.disabled = false; btn.textContent = old;
  });
  document.getElementById('collUploadBtn').addEventListener('click', ()=>collFileInp.click());
  document.getElementById('collClearCover').addEventListener('click', ()=>{ collCover=''; collUrlInp.value=''; drawCollPrev(); });
  collFileInp.addEventListener('change', async ()=>{
    const f = collFileInp.files[0]; if(!f) return;
    try{ collCover = await downscaleImage(f); collUrlInp.value=''; drawCollPrev(); }
    catch(e){}
  });
  // Подсветка выбранных
  modal.querySelectorAll('.coll-pick-item input').forEach(cb=>{
    cb.addEventListener('change', ()=>cb.closest('.coll-pick-item').classList.toggle('sel', cb.checked));
  });
  // Поиск по списку игр
  document.getElementById('collPickSearch').addEventListener('input', function(){
    const q = this.value.trim().toLowerCase();
    modal.querySelectorAll('.coll-pick-item').forEach(el=>{
      const title = el.querySelector('.coll-pick-title');
      el.style.display = (!q || (title && title.textContent.toLowerCase().includes(q))) ? '' : 'none';
    });
  });
  document.getElementById('collSave').addEventListener('click', async ()=>{
    const title = document.getElementById('collTitle').value.trim();
    const review = document.getElementById('collReview').value.trim();
    const err = document.getElementById('collErr');
    const itemIds = [...modal.querySelectorAll('.coll-pick-item input:checked')].map(cb=>cb.value);
    if(!title){ err.textContent = 'Впиши название.'; return; }
    if(itemIds.length < 2){ err.textContent = 'Выбери хотя бы 2 обзора.'; return; }
    const coll = { id: isEdit?editColl.id:('c'+Date.now()), title, review, cover: collCover, itemIds, created: isEdit?editColl.created:Date.now() };
    if(isEdit){ collections = collections.map(c=>c.id===coll.id?coll:c); }
    else { collections = [coll, ...collections]; }
    await saveCollections(domain, collections);
    closeModal(); boardTab = 'collections'; render();
  });
}

/* ================================================================ */
function openDetail(id, list, readonly, onBack, backLabel){
  list = list || games;
  const g = list.find(x=>x.id===id); if(!g) return;
  const t = tierOf(g.score);
  const meta = [g.genre, g.status].filter(Boolean).join(' · ');
  showModal(`
    <button class="close" onclick="__close()">×</button>
    ${onBack?`<button class="btn ghost sm modal-back" id="backBtn">${esc(backLabel||'← Назад в профиль')}</button>`:''}
    ${g.cover?`<div class="rd-banner"><img src="${esc(g.cover)}" alt="" onerror="this.closest('.rd-banner').style.display='none'"></div>`:''}
    <div class="rd-head">
      <div>
        <h3 style="margin-bottom:2px">${esc(g.title)}</h3>
        <div class="rd-meta">${esc(meta)||'—'}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="rd-score" style="color:${t.color}">${g.score.toFixed(1)}</div>
        <div class="mono" style="font-size:12px;color:var(--muted)">тир ${t.key}</div>
      </div>
    </div>
    <div class="rd-body ${g.review?'':'empty'}">${g.review?esc(g.review):'Обзор пока не написан.'}</div>
    ${domain==='movies'?movieLinkHTML(g):''}
    ${domain==='games'?`<a class="kp-link" href="${gameUrl(g)}" target="_blank" rel="noopener">📖 Открыть в Википедии ↗</a>`:''}
    <div class="rx-container" id="rxContainer"></div>
    ${readonly ? '' : `<div class="rd-actions">
      <button class="btn ghost sm" id="editG">Редактировать</button>
      <button class="btn ghost sm" id="delG" style="color:var(--s)">Удалить</button>
    </div>`}
  `);
  if(onBack){ const bb=document.getElementById('backBtn'); if(bb) bb.addEventListener('click', onBack); }

  // Реакции: readonly=true → чужой обзор (owner = нужен снаружи), readonly=false → мой
  const rxContainer = document.getElementById('rxContainer');
  if(rxContainer) renderReactions(rxContainer, readonly ? (list.__owner || null) : myHandle, g.id, !readonly);

  if(readonly) return;
  document.getElementById('editG').addEventListener('click', ()=>openForm(id));
  armButton(document.getElementById('delG'), 'Точно удалить?', async ()=>{
    games = games.filter(x=>x.id!==id);
    await saveGames(games); closeModal(); render();
  });
}

window.__close = closeModal;

/* ---------------- Reset ---------------- */
armButton(document.getElementById('resetBtn'), 'Точно очистить этот раздел? Нажми ещё раз', async ()=>{
  try{ await window.storage.delete(D().itemsKey, false); }catch(e){}
  games = []; itemsStore[domain] = [];
  statusFilter = 'all'; searchQuery = '';
  render();
});

/* ---------------- Boot ---------------- */
(async function init(){
  const p = await loadProfile();
  if(p) profile = {...profile, ...p};
  if(!profile.cosmetics) profile.cosmetics = {frame:null,accent:null,title:null};
  if(!Array.isArray(profile.owned)) profile.owned = [];
  itemsStore.games  = await loadItems('games');
  itemsStore.movies = await loadItems('movies');
  collectionsStore.games  = await loadCollections('games');
  collectionsStore.movies = await loadCollections('movies');
  handleStore.games  = await loadHandleFor('games');
  handleStore.movies = await loadHandleFor('movies');
  games = itemsStore[domain];
  myHandle = handleStore[domain];
  collections = collectionsStore[domain];
  coinBalance = await loadCoinBalance();
  balanceStore[domain] = coinBalance;
  musicUrl = await loadMusicUrl();
  rlVolume = await loadRlVolume();
  const cc = await loadCenterCfg(); if(cc) centerCfg = cc;

  // Проверка сезона косметики: если сезон в базе отличается от локального — полный сброс owned и cosmetics
  try{
    const { data: cfg } = await sb.from('app_config').select('value').eq('key','cosmetics_season').maybeSingle();
    const serverSeason = cfg ? cfg.value : '1';
    const localSeason = localStorage.getItem('cosmetics_season') || '0';
    if(serverSeason !== localSeason){
      profile.owned = [];
      profile.cosmetics = {frame:null,accent:null,title:null,background:null,nameFx:null,badge:null,roulette:null};
      await saveProfile(profile);
      localStorage.setItem('cosmetics_season', serverSeason);
      if(myHandle){
        try{ await sb.from('public_profiles').update({cosmetics:null}).eq('id', domain+':'+myHandle); }catch(e){}
      }
    }
  }catch(e){ /* база недоступна — пропускаем */ }

  document.body.dataset.domain = domain;
  // Если это устройство уже привязано (сохранён PIN) — подтягиваем актуальные данные из облака,
  // чтобы профиль совпадал с тем, что видно на других устройствах/браузерах.
  await syncFromCloud(domain);
  render();
  loadFriendsActivity();
  loadFriendsReviews();
  loadRecentCollections();
  loadLeaderboard();
  syncFromCloud(domain==='games'?'movies':'games'); // фоновая подтяжка второго домена, без ожидания
  const activityRefreshBtn = document.getElementById('activityRefreshBtn');
  if(activityRefreshBtn) activityRefreshBtn.addEventListener('click', loadFriendsActivity);
  const reviewsRefreshBtn = document.getElementById('reviewsRefreshBtn');
  if(reviewsRefreshBtn) reviewsRefreshBtn.addEventListener('click', ()=>{ loadFriendsReviews(); loadRecentCollections(); });
  openSharedProfileFromURL();
})();
</script>
