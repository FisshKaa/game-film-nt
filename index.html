<!-- Персональный игровой рейтинг: профиль, обзоры, тир-лист -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --ink:#0e0e16; --ink2:#14141f; --surface:#1a1a28; --surface2:#22222f;
    --line:#2c2c3d; --text:#eae8f4; --muted:#928fab; --muted2:#6b6882;
    --accent:#f5b942; --accent-dim:#a37a1f;
    --s:#ff477e; --a:#ff8c42; --b:#ffd23f; --c:#4ade80; --d:#38bdf8; --f:#94a3b8;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* Глобальный скроллбар */
  *{scrollbar-width:thin;scrollbar-color:var(--accent-dim) var(--ink2)}
  *::-webkit-scrollbar{width:5px;height:5px}
  *::-webkit-scrollbar-track{background:var(--ink2);border-radius:99px}
  *::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:99px}
  *::-webkit-scrollbar-thumb:hover{background:var(--accent)}
  *::-webkit-scrollbar-corner{background:var(--ink2)}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1100px 600px at 78% -8%, #201a2e 0%, transparent 55%),
      radial-gradient(900px 500px at -5% 110%, #17222b 0%, transparent 50%),
      var(--ink);
    color:var(--text); font-family:'Hanken Grotesk',system-ui,sans-serif;
    line-height:1.5; min-height:100vh; padding:22px 16px 60px;
  }
  body[data-domain="movies"]{
    --accent:#8b7bff; --accent-dim:#4a3f92;
    background:
      radial-gradient(1100px 600px at 78% -8%, #211a35 0%, transparent 55%),
      radial-gradient(900px 500px at -5% 110%, #141f2e 0%, transparent 50%),
      var(--ink);
  }
  .wrap{max-width:940px;margin:0 auto}
  .mono{font-family:'Space Mono',monospace}

  /* ---------- Cosmetics + shop ---------- */
  .fr-gold{box-shadow:0 0 0 3px #f5b942, 0 0 14px #f5b94288}
  .fr-neon{box-shadow:0 0 0 3px #22d3ee, 0 0 16px #22d3eeaa}
  .fr-fire{animation:frFire 1.6s ease-in-out infinite alternate}
  @keyframes frFire{from{box-shadow:0 0 0 3px #fb923c,0 0 10px #f9731666}to{box-shadow:0 0 0 3px #f87171,0 0 22px #ef4444aa}}
  .fr-rainbow{animation:frRainbow 4s linear infinite}
  @keyframes frRainbow{0%{box-shadow:0 0 0 3px #f87171,0 0 16px #f8717188}25%{box-shadow:0 0 0 3px #fbbf24,0 0 16px #fbbf2488}50%{box-shadow:0 0 0 3px #34d399,0 0 16px #34d39988}75%{box-shadow:0 0 0 3px #38bdf8,0 0 16px #38bdf888}100%{box-shadow:0 0 0 3px #a78bfa,0 0 16px #a78bfa88}}
  .fr-ice{box-shadow:0 0 0 3px #bae6fd, 0 0 14px #7dd3fc88}
  .fr-royal{box-shadow:0 0 0 3px #7c3aed, 0 0 16px #7c3aed88;animation:frRoyal 2s ease-in-out infinite}
  @keyframes frRoyal{0%,100%{box-shadow:0 0 0 3px #7c3aed,0 0 10px #7c3aed66}50%{box-shadow:0 0 0 3px #a78bfa,0 0 22px #a78bfaaa}}
  .fr-pulse{animation:frPulse 1s ease-in-out infinite}
  @keyframes frPulse{0%,100%{box-shadow:0 0 0 2px var(--accent),0 0 0 4px transparent}50%{box-shadow:0 0 0 2px var(--accent),0 0 0 6px var(--accent-dim)}}
  .fr-toxic{box-shadow:0 0 0 3px #4ade80, 0 0 14px #4ade8088;animation:frToxic 1.4s ease-in-out infinite alternate}
  @keyframes frToxic{from{box-shadow:0 0 0 3px #4ade80,0 0 8px #4ade8066}to{box-shadow:0 0 0 3px #a3e635,0 0 20px #a3e635aa}}
  .fr-galaxy{animation:frGalaxy 6s linear infinite}
  @keyframes frGalaxy{0%{box-shadow:0 0 0 3px #818cf8,0 0 18px #818cf888}20%{box-shadow:0 0 0 3px #38bdf8,0 0 18px #38bdf888}40%{box-shadow:0 0 0 3px #a78bfa,0 0 18px #a78bfa88}60%{box-shadow:0 0 0 3px #f472b6,0 0 18px #f472b688}80%{box-shadow:0 0 0 3px #34d399,0 0 18px #34d39988}100%{box-shadow:0 0 0 3px #818cf8,0 0 18px #818cf888}}
  .p-title{display:inline-block;margin-top:6px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--line);color:var(--text)}
  .lb-handle .p-title{margin-top:0;font-size:10px;padding:1px 7px}
  .shop-bal{font-family:'Space Mono',monospace;font-size:15px;margin:2px 0 10px}
  .shop-bal b{color:var(--accent)}
  .shop-cat{margin-top:16px}
  .shop-cat-h{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
  .shop-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
  .shop-item.equipped{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .shop-lbl{font-size:13px;font-weight:600;line-height:1.2}
  .shop-act{margin-top:auto;display:flex;flex-direction:column;gap:5px;align-items:center;width:100%}
  .shop-owned{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em}
  .shop-av{width:52px;height:52px;font-size:26px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--ink2)}
  .shop-acc{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px}
  .shop-ti{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--line)}
  .btn.sm.disabled,.shop-buy:disabled{opacity:.45;cursor:not-allowed}

  /* Фон профиля */
  .bg-aurora{background:linear-gradient(135deg,#1e3a5f,#2d1b4e 55%,#3d1f5c)!important}
  .bg-sunset{background:linear-gradient(135deg,#4a1e2b,#7a2e3a 60%,#b4632f)!important}
  .bg-ocean{background:linear-gradient(135deg,#0b3d5c,#1a6a8a 55%,#0d7377)!important}
  .bg-neon{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)!important}
  .bg-space{background:radial-gradient(1.5px 1.5px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 62% 68%,#fff,transparent),radial-gradient(1.5px 1.5px at 82% 22%,#dde,transparent),radial-gradient(1.5px 1.5px at 40% 80%,#fff,transparent),linear-gradient(160deg,#0b1026,#161a3a)!important}
  .bg-forest{background:linear-gradient(135deg,#052e16,#14532d 55%,#166534)!important}
  .bg-lava{background:linear-gradient(135deg,#450a0a,#7f1d1d 50%,#b91c1c)!important}
  .bg-ice{background:linear-gradient(135deg,#0c4a6e,#075985 50%,#0369a1)!important}
  .bg-void{background:radial-gradient(ellipse at 30% 40%,#1e1b4b 0%,#0f0e1a 60%,#000 100%)!important}
  .bg-candy{background:linear-gradient(135deg,#4a044e,#7e22ce 45%,#ec4899 100%)!important}
  .fp-head{padding:12px;border-radius:14px}
  .name-row{display:flex;align-items:center;gap:8px}
  .p-nbadge{font-size:20px;line-height:1;flex-shrink:0}
  .fn .p-nbadge,.fp-name .p-nbadge,.lb-name .p-nbadge{font-size:0.9em;margin-right:2px}
  .nm-txt{display:inline-block}
  .p-edit{background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:9px;
    padding:4px 9px;font-size:14px;cursor:pointer;flex-shrink:0;line-height:1}
  .p-edit:hover{color:var(--text);border-color:var(--muted2)}
  .me-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;background:var(--accent-dim);
    color:#12121a;padding:1px 6px;border-radius:20px;margin-left:8px;vertical-align:middle}

  /* Анимация имени */
  .fx-gold{background:linear-gradient(90deg,#f5b942,#fff3c4,#f5b942);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  .fx-glow{animation:fxGlow 1.8s ease-in-out infinite}
  @keyframes fxGlow{0%,100%{text-shadow:0 0 6px currentColor}50%{text-shadow:0 0 16px currentColor}}
  .fx-shimmer{background:linear-gradient(90deg,#a78bfa,#38bdf8,#34d399,#a78bfa);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:fxShimmer 3s linear infinite}
  @keyframes fxShimmer{0%{background-position:0% 50%}100%{background-position:300% 50%}}
  .fx-fire{background:linear-gradient(0deg,#f59e0b,#ef4444);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:fxGlow 1.2s ease-in-out infinite}
  .fx-glitch{animation:fxGlitch 2.5s infinite}
  @keyframes fxGlitch{0%,90%,100%{text-shadow:none}91%{text-shadow:-2px 0 #f87171,2px 0 #38bdf8}93%{text-shadow:2px 0 #f87171,-2px 0 #38bdf8}95%{text-shadow:-2px 0 #a78bfa,2px 0 #34d399}97%{text-shadow:none}}
  .fx-ice{background:linear-gradient(90deg,#bae6fd,#e0f2fe,#7dd3fc);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  .fx-matrix{background:linear-gradient(180deg,#4ade80,#16a34a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:fxMatrix 1.5s ease-in-out infinite alternate}
  @keyframes fxMatrix{from{filter:brightness(1)}to{filter:brightness(1.8) drop-shadow(0 0 6px #4ade80)}}
  .fx-neon{color:#f0abfc;animation:fxNeon 1s ease-in-out infinite alternate}
  @keyframes fxNeon{from{text-shadow:0 0 4px #f0abfc,0 0 12px #d946ef}to{text-shadow:0 0 8px #f0abfc,0 0 24px #d946ef,0 0 40px #a21caf}}
  .fx-rainbow{background:linear-gradient(90deg,#f87171,#fb923c,#fbbf24,#34d399,#38bdf8,#818cf8,#f472b6,#f87171);background-size:400% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:fxShimmer 2s linear infinite}

  /* Скины рулетки + конфетти */
  .wheel-wrap.rs-neon{filter:drop-shadow(0 0 10px #22d3eeaa)}
  .wheel-wrap.rs-gold{filter:drop-shadow(0 0 12px #f5b942bb)}
  /* Ленты: CS-кейс (гориз.) и слот (вертик.) */
  .strip-wrap{position:relative;margin:14px auto 6px;overflow:hidden;border:1px solid var(--line);
    border-radius:14px;background:var(--ink)}
  .strip-wrap[data-axis="x"]{width:100%;max-width:470px;height:150px}
  .strip-wrap[data-axis="y"]{width:150px;max-width:60%;height:300px}
  .strip-track{display:flex;gap:8px;padding:8px;will-change:transform}
  .strip-wrap[data-axis="x"] .strip-track{flex-direction:row;height:100%;align-items:stretch}
  .strip-wrap[data-axis="y"] .strip-track{flex-direction:column;width:100%}
  .strip-cell{flex:0 0 auto;background:var(--surface);border:2px solid var(--line);border-radius:10px;
    overflow:hidden;display:flex;flex-direction:column}
  .strip-wrap[data-axis="x"] .strip-cell{width:116px;height:100%}
  .strip-wrap[data-axis="y"] .strip-cell{width:100%;height:84px;flex-direction:row;align-items:center}
  .strip-cell img{width:100%;height:100%;object-fit:cover;flex:1;min-height:0}
  .strip-wrap[data-axis="y"] .strip-cell img{width:84px;height:84px;flex:0 0 84px}
  .strip-noimg{flex:1;display:grid;place-items:center;font-size:30px;background:var(--ink2)}
  .strip-wrap[data-axis="y"] .strip-noimg{flex:0 0 84px;width:84px;height:84px}
  .strip-title{font-size:11px;padding:4px 6px;text-align:center;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;flex-shrink:0}
  .strip-wrap[data-axis="y"] .strip-title{flex:1;text-align:left}
  .strip-pointer{position:absolute;z-index:5;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .strip-wrap[data-axis="x"] .strip-pointer{top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%)}
  .strip-wrap[data-axis="y"] .strip-pointer{left:0;right:0;top:50%;height:3px;transform:translateY(-50%)}
  .strip-wrap::before,.strip-wrap::after{content:'';position:absolute;z-index:3;pointer-events:none}
  .strip-wrap[data-axis="x"]::before{left:0;top:0;bottom:0;width:70px;background:linear-gradient(90deg,var(--ink),transparent)}
  .strip-wrap[data-axis="x"]::after{right:0;top:0;bottom:0;width:70px;background:linear-gradient(270deg,var(--ink),transparent)}
  .strip-wrap[data-axis="y"]::before{top:0;left:0;right:0;height:50px;background:linear-gradient(180deg,var(--ink),transparent)}
  .strip-wrap[data-axis="y"]::after{bottom:0;left:0;right:0;height:50px;background:linear-gradient(0deg,var(--ink),transparent)}
  .strip-wrap.rs-case-gold{border-color:#f5b942;box-shadow:0 0 16px #f5b94244}
  .strip-wrap.rs-case-gold .strip-pointer{background:#f5b942;box-shadow:0 0 12px #f5b942}
  .strip-wrap.rs-case{border-color:#22d3ee55}
  .strip-wrap.rs-case .strip-pointer{background:#22d3ee;box-shadow:0 0 12px #22d3ee}
  /* Слот-машина: три колонки */
  .slot-wrap{position:relative;display:flex;gap:8px;justify-content:center;margin:14px auto 6px;padding:8px;
    border:1px solid var(--line);border-radius:14px;background:var(--ink);width:fit-content;max-width:100%}
  .slot-reel{width:90px;height:246px;overflow:hidden;border-radius:10px;background:var(--ink2);position:relative}
  /* Затемнение по краям барабана */
  .slot-reel::before,.slot-reel::after{content:'';position:absolute;left:0;right:0;z-index:4;pointer-events:none}
  .slot-reel::before{top:0;height:60px;background:linear-gradient(180deg,var(--ink2),transparent)}
  .slot-reel::after{bottom:0;height:60px;background:linear-gradient(0deg,var(--ink2),transparent)}
  .slot-track{display:flex;flex-direction:column;gap:6px;padding:4px;will-change:transform}
  .slot-cell{width:82px;height:76px;border:2px solid var(--line);border-radius:8px;overflow:hidden;
    display:flex;flex-direction:column;background:var(--surface);flex:0 0 auto}
  .slot-cell img{width:100%;flex:1;object-fit:cover;min-height:0}
  .slot-cell-title{font-size:10px;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
  .slot-noimg{flex:1;display:grid;place-items:center;font-size:26px}
  /* Линия-указатель: центральная строка (top: padding 4px + cellH 76 + gap 6 = 86px от верха трека) */
  .slot-line{position:absolute;left:4px;right:4px;top:calc(50% - 39px);height:76px;border:2px solid var(--accent);
    border-radius:8px;background:rgba(255,255,255,.04);box-shadow:0 0 16px var(--accent);pointer-events:none;z-index:6}
  .slot-dir-down::before{display:none}
  /* Стрелка направления над каждым барабаном */
  .slot-arrow{text-align:center;font-size:14px;color:var(--muted);margin-bottom:2px;line-height:1}
  .slot-col{display:flex;flex-direction:column;align-items:center}
  .confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
  .confetti-piece{position:absolute;top:0;width:9px;height:14px;border-radius:2px;animation:confFall linear forwards}
  @keyframes confFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(600deg);opacity:.85}}

  /* Превью в магазине */
  .shop-bg{width:62px;height:38px;border-radius:8px;border:1px solid var(--line)}
  .shop-fx{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px}
  .shop-sym{font-size:26px;line-height:1}
  .shop-rl{font-size:26px;line-height:1;width:44px;height:44px;display:grid;place-items:center;border-radius:12px}

  /* ---------- Leaderboard "Самый добрий" ---------- */
  .leaderboard{margin-top:30px}
  .lb-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;
    text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 2px 12px;
    display:flex;align-items:center;gap:10px}
  .lb-title::after{content:'';flex:1;height:1px;background:var(--line)}
  .lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .lb-card{background:linear-gradient(180deg,rgba(245,185,66,.08),transparent);
    border:1px solid var(--accent-dim);border-radius:var(--radius);padding:16px 18px;
    display:flex;align-items:center;gap:14px;min-height:78px}
  .lb-card .lb-dom{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .lb-crown{font-size:30px;line-height:1;flex-shrink:0}
  .lb-who{flex:1;min-width:0}
  .lb-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;line-height:1.1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-handle{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted2)}
  .lb-coins{font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:var(--accent);white-space:nowrap}
  .lb-empty{color:var(--muted2);font-size:13px;font-style:italic}
  .lb-me{font-family:'Space Mono',monospace;font-size:10px;background:var(--accent-dim);color:#12121a;
    padding:1px 6px;border-radius:20px;margin-left:8px;vertical-align:middle}
  @media(max-width:560px){ .lb-grid{grid-template-columns:1fr} }

  /* ---------- Friends activity sidebar ---------- */
  .layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:250px 1fr 270px;gap:22px;align-items:start}
  .layout > .wrap{max-width:none;margin:0}
  .activity-side, .reviews-side{
    position:sticky; top:20px;
    background:linear-gradient(180deg,var(--ink2),var(--surface));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; max-height:calc(100vh - 40px); overflow-y:auto; overflow-x:hidden;
  }
  .activity-side h3, .reviews-side h3{
    font-family:'Bricolage Grotesque',sans-serif; font-size:13px; font-weight:800;
    letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;
  }
  .activity-refresh{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:11px;border-radius:8px;padding:3px 8px;margin-bottom:12px;cursor:pointer;
  }
  .activity-refresh:hover{color:var(--text);border-color:var(--accent-dim)}
  .activity-empty{font-size:12.5px;color:var(--muted2);line-height:1.5}
  .activity-block{padding:8px 0;border-bottom:1px solid var(--line)}
  .activity-block:last-child{border-bottom:none}
  .activity-item{display:flex;gap:10px;align-items:center}
  .activity-avatar{
    width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:19px;flex-shrink:0;
    background:radial-gradient(circle at 30% 25%,#2f2a45,#191527); border:1px solid var(--line);
  }
  .activity-info{min-width:0;flex:1}
  .activity-name{font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .activity-game{font-size:12px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Аккордеон "Сейчас играют" */
  .acc-person{border-bottom:1px solid var(--line)}
  .acc-person:last-child{border-bottom:none}
  .acc-head{display:flex;align-items:center;gap:8px;padding:8px 4px;cursor:pointer;
    border-radius:8px;transition:background .12s;user-select:none}
  .acc-head:hover{background:var(--surface2)}
  .acc-name{flex:1;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acc-arrow{font-size:11px;color:var(--muted);flex-shrink:0;transition:transform .15s}
  .acc-body{padding-bottom:6px}
  .acc-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-radius:8px;
    cursor:pointer;transition:background .12s}
  .acc-row:hover{background:var(--surface2)}
  .acc-cover{width:44px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0;display:block}
  .acc-nocover{width:44px;height:44px;border-radius:8px;background:var(--ink2);
    display:grid;place-items:center;font-size:22px;flex-shrink:0}
  .acc-info{flex:1;min-width:0}
  .acc-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acc-genre{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acc-pot{font-size:10px;color:#f5c451;font-family:'Space Mono',monospace;display:block;margin-top:2px}
  .acc-bet-btn{flex-shrink:0;background:var(--ink);border:1px solid var(--line);border-radius:8px;
    width:28px;height:28px;font-size:13px;cursor:pointer;transition:border-color .15s;
    display:grid;place-items:center}
  .acc-bet-btn:hover{border-color:var(--accent-dim)}
  .activity-pot{font-size:10.5px;color:#f5c451;margin-top:6px;cursor:pointer;user-select:none}
  .activity-pot:hover{color:#ffd873}
  .bet-list{margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
  .bet-row{font-size:11.5px;color:var(--text);margin-bottom:5px;line-height:1.4}
  .bet-row b{color:var(--accent)}
  .bet-row .bet-note{color:var(--muted);font-style:italic;display:block;margin-top:1px}
  .bet-btn{
    flex-shrink:0;background:var(--ink);border:1px solid var(--line);border-radius:9px;
    width:30px;height:30px;font-size:14px;cursor:pointer;transition:border-color .15s,transform .15s;
  }
  .bet-btn:hover{border-color:var(--accent-dim);transform:translateY(-1px)}
  .resolve-box{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .resolve-box h4{font-family:'Bricolage Grotesque',sans-serif;font-size:12px;font-weight:800;
    letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .resolve-item{padding:8px 0;border-bottom:1px solid var(--line)}
  .resolve-item:last-child{border-bottom:none}
  .resolve-top{font-size:12.5px;color:var(--text);margin-bottom:2px}
  .resolve-top b{color:var(--accent)}
  .resolve-note{font-size:11.5px;color:var(--muted);font-style:italic;margin-bottom:6px}
  .stake-row{font-size:12px;color:var(--text);padding:2px 0}
  .resolve-actions{display:flex;gap:6px}
  .resolve-actions button{
    flex:1;font-size:11px;padding:5px 6px;border-radius:7px;border:1px solid var(--line);
    background:var(--ink);color:var(--text);cursor:pointer;
  }
  .stake-sups{display:flex;flex-wrap:wrap;gap:4px;margin:3px 0 4px}
  .stake-sup-pill{font-size:10px;background:var(--surface2);border:1px solid var(--accent-dim);
    border-radius:20px;padding:1px 7px;color:var(--text);font-family:'Space Mono',monospace}
  .stake-total{font-size:10px;color:var(--accent);font-family:'Space Mono',monospace}
  .resolve-win:hover{border-color:var(--c);color:var(--c)}
  .bet-existing{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .bet-existing-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:12px;
    text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px}
  .bet-existing-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:start;
    padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .bet-existing-row:last-child{border-bottom:none}
  .bet-existing-who{font-weight:700;color:var(--accent);white-space:nowrap}
  .bet-existing-note{color:var(--muted);font-style:italic;min-width:0}
  .bet-existing-amt{font-family:'Space Mono',monospace;font-size:12px;color:var(--text);
    white-space:nowrap;text-align:right}
  .bet-existing-row{padding:9px 0;border-bottom:1px solid var(--line)}
  .bet-existing-row:last-child{border-bottom:none}
  .bet-existing-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .bet-existing-who{font-weight:700;color:var(--accent)}
  .bet-existing-note{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:4px}
  .bet-sups{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .bet-sup-pill{font-size:11px;background:var(--surface2);border:1px solid var(--accent-dim);
    border-radius:20px;padding:2px 8px;color:var(--text)}
  .bet-sup-btn{font-size:11px;font-weight:700;background:var(--accent-dim);color:#12121a;
    border:none;border-radius:20px;padding:2px 9px;cursor:pointer;margin-left:auto;flex-shrink:0}
  .bet-sup-btn:hover{background:var(--accent)}
  .bet-sup-done{font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0}
  .bet-sup-form{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
  .bet-sup-inp{width:52px;background:var(--ink);border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-size:12px;padding:2px 6px;text-align:center}
  .bet-sup-confirm{padding:2px 9px!important;font-size:11px!important}
  .bet-sup-cancel{background:var(--surface2);border:1px solid var(--line);border-radius:20px;
    color:var(--muted);font-size:11px;padding:2px 8px;cursor:pointer}
  .bet-sup-cancel:hover{color:var(--text);border-color:var(--muted2)}
  .resolve-lose:hover{border-color:var(--s);color:var(--s)}

  /* ---------- Friends reviews sidebar ---------- */
  .review-item{padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px;transition:background .12s}
  .review-item:last-child{border-bottom:none}
  .review-item:hover{background:var(--surface2)}
  .review-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .review-name{flex:1;min-width:0;font-weight:700;font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .review-score{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;flex-shrink:0}
  .review-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .review-snippet{font-size:12px;color:var(--muted);line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  @media(max-width:1180px){
    .layout{grid-template-columns:1fr}
    .activity-side, .reviews-side{position:static;max-height:none;margin-top:16px}
    .activity-side{order:2}
    .layout > .wrap{order:1}
    .reviews-side{order:3}
  }

  /* Domain switch + movies palette */
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .topbar .domain-switch{margin:0}
  .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .domain-switch{display:flex;gap:6px;margin:0 0 16px;background:var(--ink2);border:1px solid var(--line);
    border-radius:12px;padding:5px;width:fit-content}
  .domain-switch button{background:transparent;color:var(--muted);font-size:14px;font-weight:700;
    padding:8px 16px;border-radius:8px;font-family:'Bricolage Grotesque',sans-serif;transition:background .15s,color .15s}
  .domain-switch button.active{background:var(--accent);color:#12121a}
  .domain-switch button:hover:not(.active){color:var(--text)}

  /* ---------- Profile header ---------- */
  .profile{
    position:relative; background:linear-gradient(180deg,var(--ink2),var(--surface));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:26px 26px 22px; overflow:hidden;
  }
  .profile::before{
    content:""; position:absolute; inset:0; opacity:.5; pointer-events:none;
    background:
      repeating-linear-gradient(115deg, transparent 0 22px, rgba(245,185,66,.03) 22px 23px);
  }
  .p-top{display:flex; gap:18px; align-items:center; position:relative}
  .avatar{
    width:74px;height:74px;border-radius:20px;flex-shrink:0;
    display:grid;place-items:center;font-size:38px; cursor:pointer;
    background:radial-gradient(circle at 30% 25%,#2f2a45,#191527);
    border:1px solid var(--line); transition:transform .15s, border-color .15s;
    user-select:none;
  }
  .avatar:hover{transform:translateY(-2px);border-color:var(--accent-dim)}
  .p-id{flex:1;min-width:0}
  .p-name{
    font-family:'Bricolage Grotesque',sans-serif; font-weight:800;
    font-size:clamp(24px,5vw,34px); line-height:1.05; letter-spacing:-.02em;
    color:var(--text); padding:2px 0; cursor:pointer; word-break:break-word;
  }
  .p-tag-disp{cursor:pointer}
  .p-tag{
    background:transparent;border:none;color:var(--muted);width:100%;
    font-size:14px; outline:none; margin-top:4px; padding:2px 0;
    border-bottom:1px solid transparent;
  }
  .p-tag:focus{border-bottom-color:var(--line)}
  .edit-hint{font-size:11px;color:var(--muted2);margin-top:2px}

  .stats{
    display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
    margin-top:20px; position:relative;
  }
  .stat{
    background:var(--ink); border:1px solid var(--line); border-radius:12px;
    padding:12px 12px 10px; text-align:left;
  }
  .stat .num{font-family:'Space Mono',monospace;font-size:23px;font-weight:700;color:var(--accent);line-height:1}
  .stat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}

  /* ---------- Toolbar ---------- */
  .bar{display:flex;gap:10px;align-items:center;margin:22px 0 16px;flex-wrap:wrap}
  .bar h2{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:19px;letter-spacing:-.01em;margin-right:auto;
  }
  button{font-family:inherit;cursor:pointer;border:none}
  .btn{
    background:var(--accent);color:#241a05;font-weight:600;font-size:14px;
    padding:11px 18px;border-radius:11px;transition:transform .12s,filter .12s;
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--muted2)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.armed{background:var(--s)!important;color:#fff!important;border-color:var(--s)!important}
  .foot button.armed{color:var(--s);font-weight:700}

  /* ---------- Search ---------- */
  .search{
    background:var(--ink);border:1px solid var(--line);border-radius:11px;
    color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;
    flex:1;min-width:150px;max-width:300px;transition:border-color .15s;
  }
  .search:focus{border-color:var(--accent-dim)}
  .search::placeholder{color:var(--muted2)}
  .search-count{font-size:12px;color:var(--muted2);margin:-4px 2px 12px}

  /* ---------- Status filter chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
  .chip{background:var(--ink2);border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:22px;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,color .15s,background .15s}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .chip b{font-family:'Space Mono',monospace;font-weight:700;color:var(--text)}
  .chip.active{background:var(--surface2);border-color:var(--accent-dim);color:var(--text)}
  .chip:hover:not(.active){border-color:var(--muted2);color:var(--text)}
  .chip.zero{opacity:.5}

  /* ---------- Sectioned layout ---------- */
  .section-label{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:26px 2px 12px;
    display:flex;align-items:center;gap:12px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--line)}

  .now-playing{
    background:linear-gradient(180deg,rgba(245,185,66,.09),rgba(245,185,66,.02));
    border:1px solid var(--accent-dim);border-radius:var(--radius);padding:16px 16px 14px;
  }
  .block-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .block-head h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px}
  .block-head .cnt{font-family:'Space Mono',monospace;color:var(--muted2);font-size:12px;margin-left:auto}
  .np-live{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 rgba(245,185,66,.5);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,185,66,.45)}70%{box-shadow:0 0 0 9px rgba(245,185,66,0)}100%{box-shadow:0 0 0 0 rgba(245,185,66,0)}}
  .block-grid{display:flex;flex-wrap:wrap;gap:10px}

  .backlog{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px}
  .backlog .card{background:var(--ink)}

  .cstatus.noreview{border-color:var(--accent-dim);color:var(--accent)}
  .cstatus .sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

  @media(prefers-reduced-motion:reduce){ .np-live{animation:none} }

  /* ---------- Tabs / nav ---------- */
  .nav{display:flex;gap:6px;margin:18px 0 4px;background:var(--ink2);
    border:1px solid var(--line);border-radius:12px;padding:5px;width:fit-content}
  .nav button{background:transparent;color:var(--muted);font-size:14px;font-weight:600;
    padding:8px 18px;border-radius:8px;transition:background .15s,color .15s}
  .nav button.active{background:var(--surface2);color:var(--text)}
  .nav button:hover:not(.active){color:var(--text)}

  /* ---------- Community ---------- */
  .comm-note{font-size:13px;color:var(--muted);margin:2px 0 16px;line-height:1.5}
  .friends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:16px;cursor:pointer;transition:transform .13s,border-color .13s;display:flex;gap:13px;align-items:center}
  .fcard:hover{transform:translateY(-3px);border-color:var(--muted2)}
  .fcard .fav{width:50px;height:50px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;
    font-size:26px;background:radial-gradient(circle at 30% 25%,#2f2a45,#191527);border:1px solid var(--line)}
  .fcard .fn{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;line-height:1.1}
  .fcard .fm{font-size:12px;color:var(--muted);margin-top:3px}
  .fmodal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0 6px}
  .fmodal-stats .stat{padding:10px}
  .fmodal-stats .num{font-size:19px}

  /* ---------- Tier board ---------- */
  .tier{
    display:grid; grid-template-columns:64px 1fr; gap:12px; margin-bottom:12px;
    align-items:stretch;
  }
  .tier-badge{
    border-radius:13px;display:grid;place-items:center;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;
    color:#12121a; position:relative;
  }
  .tier-badge span{position:relative;z-index:1}
  .tier-badge small{
    position:absolute;bottom:6px;left:0;right:0;text-align:center;
    font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
    color:rgba(18,18,26,.65);letter-spacing:.03em;
  }
  .tier-row{
    background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:10px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start;
    min-height:74px;
  }
  .tier-empty{color:var(--muted2);font-size:13px;align-self:center;padding:0 6px;font-style:italic}

  .card{
    background:var(--ink2);border:1px solid var(--line);border-radius:11px;
    min-width:150px;max-width:220px;cursor:pointer;overflow:hidden;
    transition:transform .13s,border-color .13s;position:relative;flex:1;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--muted2)}
  .card .cov{width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden}
  .card .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .card-body{padding:11px 13px;position:relative}
  .card .ct{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;line-height:1.2;padding-right:46px}
  .card .cg{font-size:11.5px;color:var(--muted);margin-top:3px}
  .card .cs{
    position:absolute;top:11px;right:13px;font-family:'Space Mono',monospace;
    font-weight:700;font-size:16px;
  }
  .card.has-cover .cs{
    top:9px;right:9px;padding:2px 7px;border-radius:7px;font-size:14px;
    background:rgba(10,10,18,.78);
  }
  .card.has-cover .cs{position:absolute}
  .card .cstatus{
    display:inline-block;margin-top:8px;font-size:10px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--muted2);border:1px solid var(--line);
    padding:2px 7px;border-radius:20px;
  }

  .empty-all{
    text-align:center;padding:52px 20px;border:1px dashed var(--line);
    border-radius:var(--radius);color:var(--muted);
  }
  .empty-all b{display:block;font-family:'Bricolage Grotesque',sans-serif;
    color:var(--text);font-size:18px;font-weight:700;margin-bottom:6px}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,6,12,.72);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:28px 14px;
    z-index:50;overflow-y:auto;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    width:100%;max-width:540px;padding:24px;position:relative;
    animation:pop .18s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .modal h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:21px;margin-bottom:16px}
  .close{position:absolute;top:16px;right:16px;background:var(--surface2);color:var(--muted);z-index:10;
    width:32px;height:32px;border-radius:9px;font-size:18px;line-height:1;border:1px solid var(--line)}
  .close:hover{color:var(--text)}
  /* Профиль друга: фон растянут на всё окно, контент поверх */
  .modal.fp-modal{position:relative;max-width:1040px}
  .modal.fp-modal > *{position:relative;z-index:2}
  .modal.fp-modal > .close{z-index:10}
  .modal-back{margin-bottom:16px}
  .kp-link{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:13.5px;font-weight:600;
    color:var(--accent);text-decoration:none;border:1px solid var(--accent-dim);border-radius:10px;padding:9px 14px;
    transition:background .15s}
  .kp-link:hover{background:var(--surface2)}
  .foot .attr{margin-top:10px;font-size:11px;color:var(--muted2);line-height:1.5;max-width:640px;margin-left:auto;margin-right:auto}
  .foot .attr a{color:var(--muted)}
  .cover-options{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-top:12px;
    max-height:260px;overflow:auto;padding:4px;background:var(--ink2);border:1px solid var(--line);border-radius:12px}
  .cover-opt{cursor:pointer;border:2px solid transparent;border-radius:9px;overflow:hidden;background:var(--surface2);transition:border-color .15s}
  .cover-opt:hover{border-color:var(--accent-dim)}
  .cover-opt.sel{border-color:var(--accent)}
  .cover-opt img{width:100%;height:118px;object-fit:cover;display:block}
  .cover-opt .co-cap{font-size:10px;line-height:1.3;padding:4px 5px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cover-opt-empty{grid-column:1/-1;color:var(--muted2);font-size:12.5px;padding:14px 10px;text-align:center;line-height:1.5}

  /* ---------- Roulette ---------- */
  .rl-picks{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 16px}

  /* ---------- Wheel ---------- */
  .rl-controls{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 2px;color:var(--muted);font-size:13px}
  .rl-secs{width:76px;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-family:'Space Mono',monospace;font-size:15px;padding:8px 10px;text-align:center;outline:none}
  .rl-secs:focus{border-color:var(--accent-dim)}
  .wheel-wrap{position:relative;width:290px;max-width:88%;margin:14px auto 6px;aspect-ratio:1}
  .wheel-rot{width:100%;height:100%;transform:rotate(0deg);will-change:transform}
  .wheel-rot svg{display:block;width:100%;height:100%}
  .wheel-pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;
    border-left:13px solid transparent;border-right:13px solid transparent;border-top:22px solid var(--accent);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.55))}
  .wheel-empty{display:grid;place-items:center;height:100%;color:var(--muted2);font-size:13px;text-align:center;padding:20px}
  .rl-music{display:flex;align-items:center;gap:8px;margin:2px 0 2px}
  .rl-music input{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-family:inherit;font-size:13px;padding:8px 11px;outline:none}
  .rl-music input:focus{border-color:var(--accent-dim)}
  .rl-music .mnote{font-size:16px}
  .rl-vol{display:flex;align-items:center;gap:10px;margin:4px 0 2px;color:var(--muted);font-size:13px}

/* ---------------- localStorage shim (замена window.storage для обычного хостинга) ----------------
   Повторяет API window.storage (get/set/delete/list), но хранит всё в localStorage браузера.
   Данные привязаны к конкретному устройству/браузеру, а не к аккаунту — это ок для личного использования.
   "shared" данные (публичные профили сообщества) тоже остаются локальными: на обычном статическом
   хостинге нет сервера, который мог бы синхронизировать их между разными людьми/устройствами. */
window.storage = (function(){
  const NS = 'gamevault::';
  function fullKey(key, shared){ return NS + (shared ? 'shared::' : 'priv::') + key; }
  return {
    async get(key, shared){
      const raw = localStorage.getItem(fullKey(key, shared));
      if(raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      try{ localStorage.setItem(fullKey(key, shared), value); }
      catch(e){ console.error('localStorage set failed', e); return null; }
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      const k = fullKey(key, shared);
      const existed = localStorage.getItem(k) !== null;
      localStorage.removeItem(k);
      return { key, deleted: existed, shared: !!shared };
    },
    async list(prefix, shared){
      const base = NS + (shared ? 'shared::' : 'priv::');
      const p = base + (prefix || '');
      const keys = [];
      for(let i=0; i<localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && k.indexOf(p) === 0) keys.push(k.slice(base.length));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();

async function syncFromCloud(dom){
  const isActive = dom === domain;
  const handle = isActive ? myHandle : handleStore[dom];
  if(!handle) return false;
  const pin = await loadVaultPin(dom);
  if(!pin) return false;
  try{
    const { data, error } = await sb.from('public_profiles').select('*').eq('id', dom+':'+handle).maybeSingle();
    if(error || !data) return false;
    const items = Array.isArray(data.items) ? data.items : [];
    const balance = typeof data.balance === 'number' ? data.balance : (isActive ? coinBalance : balanceStore[dom]);
    itemsStore[dom] = items;
    balanceStore[dom] = balance;
    await window.storage.set(DOMAINS[dom].itemsKey, JSON.stringify(items), false);
    await window.storage.set('coin:'+dom, String(balance), false);
    if(isActive){
      games = items; coinBalance = balance;
      profile = { ...profile, name: data.name ?? profile.name, tag: data.tag ?? profile.tag, avatar: data.avatar ?? profile.avatar, cosmetics: data.cosmetics || profile.cosmetics };
      await window.storage.set(KEY_PROFILE, JSON.stringify(profile), false);
    }
    return true;
  }catch(e){ console.error('syncFromCloud failed', dom, e); return false; }
}

// Ищет фильм на TMDB по названию → {cover, tmdbId, genre} или null
async function fetchMovieCover(title){
  if(!title) return null;
  try{
    const url = `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}&language=ru-RU&include_adult=false`;
    const res = await fetch(url, { headers:{ Authorization:'Bearer '+TMDB_TOKEN, accept:'application/json' } });
    if(!res.ok) return null;
    const data = await res.json();
    const m = data && data.results && data.results[0];
    if(!m) return null;
    const cover = m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : '';
    let genre = '';
    if(m.genre_ids && m.genre_ids.length){
      const map = await tmdbGenres();
      genre = m.genre_ids.map(id=>map[id]).filter(Boolean).slice(0,2).join(', ');
    }
    return { cover, tmdbId: m.id || null, genre };
  }catch(e){ console.error('tmdb fetch failed', e); return null; }
}
// Обложка игры из Википедии (без ключа, CORS открыт). Возвращает {cover, wikiUrl, qid} или null.
// Берём первую статью с заглавной картинкой; если картинки нет — первую статью (для ссылки/жанра).
async function fetchGameCover(title){
  if(!title) return null;
  let fallback = null;
  for(const lang of ['ru','en']){
    try{
      const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&origin=*`
        + `&redirects=1&generator=search&gsrsearch=${encodeURIComponent(title)}&gsrlimit=5`
        + `&prop=pageimages|pageprops&ppprop=wikibase_item&piprop=thumbnail&pithumbsize=500&pilicense=any`;
      const res = await fetch(url);
      if(!res.ok) continue;
      const data = await res.json();
      const pages = data && data.query && data.query.pages;
      if(!pages) continue;
      const arr = Object.values(pages).sort((a,b)=>(a.index||0)-(b.index||0));
      const qidOf = pg => (pg.pageprops && pg.pageprops.wikibase_item) || null;
      const withImg = arr.find(pg => pg.thumbnail && pg.thumbnail.source);
      if(withImg){
        return { cover: withImg.thumbnail.source, wikiUrl:`https://${lang}.wikipedia.org/?curid=${withImg.pageid}`, qid: qidOf(withImg) };
      }
      if(!fallback && arr[0]){
        fallback = { cover:'', wikiUrl:`https://${lang}.wikipedia.org/?curid=${arr[0].pageid}`, qid: qidOf(arr[0]) };
      }
    }catch(e){}
  }
  return fallback;
}
// Жанр игры из Wikidata по QID (свойство P136). Без ключа, CORS открыт. → строка или ''
async function fetchWikidataGenre(qid){
  if(!qid) return '';
  try{
    const r1 = await fetch(`https://www.wikidata.org/w/api.php?action=wbgetclaims&entity=${qid}&property=P136&format=json&origin=*`);
    if(!r1.ok) return '';
    const d1 = await r1.json();
    const claims = d1 && d1.claims && d1.claims.P136;
    if(!claims || !claims.length) return '';
    const ids = claims.map(c => c.mainsnak && c.mainsnak.datavalue && c.mainsnak.datavalue.value && c.mainsnak.datavalue.value.id)
                      .filter(Boolean).slice(0,2);
    if(!ids.length) return '';
    const r2 = await fetch(`https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${ids.join('|')}&props=labels&languages=ru|en&format=json&origin=*`);
    if(!r2.ok) return '';
    const d2 = await r2.json();
    const ents = d2 && d2.entities;
    if(!ents) return '';
    const names = ids.map(id=>{
      const e = ents[id]; if(!e || !e.labels) return '';
      const lab = e.labels.ru || e.labels.en;
      return lab ? lab.value : '';
    }).filter(Boolean);
    return names.join(', ');
  }catch(e){ return ''; }
}

async function fetchGameOptions(title){
  if(!title) return [];
  for(const lang of ['ru','en']){
    try{
      const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&origin=*`

      const arr = Object.values(pages).sort((a,b)=>(a.index||0)-(b.index||0));

    }catch(e){}
  }
  return [];

  // Загрузка ставок + поддержек
  async function loadExisting(){
    const existing = document.getElementById('betExisting');
    if(!existing) return;
    try{
      const [{ data: bets }, { data: supports }] = await Promise.all([
        sb.from('coin_bets').select('id,bettor_name,bettor_handle,amount,note')
          .eq('domain', domain).eq('target_handle', p.handle)
          .eq('item_id', item.id).eq('status','pending')
          .order('created_at', { ascending:true }),
        sb.from('bet_supports').select('bet_id,supporter_name,supporter_handle,amount')
          .eq('domain', domain).eq('target_handle', p.handle)
          .eq('item_id', item.id).eq('status','pending')
      ]);

      if(!(bets||[]).length){ existing.innerHTML = ''; return; }

      // Группируем поддержки по bet_id
      const supMap = {};
      (supports||[]).forEach(s=>{ (supMap[s.bet_id] = supMap[s.bet_id]||[]).push(s); });

      existing.innerHTML = `
        <div class="bet-existing-title">Уже поставили</div>
        ${(bets||[]).map(b=>{
          const sups = supMap[b.id] || [];
          const isMine = b.bettor_handle === myHandle;
          const alreadySupported = sups.some(s=>s.supporter_handle===myHandle);
          const canSupport = !isMine && !alreadySupported && coinBalance > 0;
          const supHTML = sups.length ? `<div class="bet-sups">${sups.map(s=>
            `<span class="bet-sup-pill">${esc(s.supporter_name||s.supporter_handle)} +${s.amount}🟡</span>`
          ).join('')}</div>` : '';
          return `<div class="bet-existing-row" data-bet-id="${esc(b.id)}">
            <div class="bet-existing-top">
              <span class="bet-existing-who">${esc(b.bettor_name||b.bettor_handle)}</span>
              <span class="bet-existing-amt">${b.amount} 🟡</span>
              ${canSupport ? `<button class="bet-sup-btn" data-bet-id="${esc(b.id)}" data-note="${esc(b.note)}" title="Поддержать эту ставку">+1</button>` : ''}
              ${alreadySupported ? `<span class="bet-sup-done">✓ поддержал</span>` : ''}
            </div>
            <div class="bet-existing-note">${esc(b.note||'—')}</div>
            ${supHTML}
          </div>`;
        }).join('')}`;

      // Привязываем кнопки поддержки
      existing.querySelectorAll('.bet-sup-btn').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const betId = btn.dataset.betId;
          const note = btn.dataset.note;
          const supAmt = Math.min(10, coinBalance) || 1;
          // Открываем мини-форму суммы
          btn.replaceWith((() => {
            const wrap = document.createElement('span');
            wrap.className = 'bet-sup-form';
            wrap.innerHTML = `<input type="number" class="bet-sup-inp" min="1" max="${coinBalance}" value="${supAmt}">
              <button class="bet-sup-confirm btn sm">✓</button>
              <button class="bet-sup-cancel">✕</button>`;
            wrap.querySelector('.bet-sup-confirm').addEventListener('click', async ()=>{              const amount = parseInt(wrap.querySelector('.bet-sup-inp').value, 10);
              if(!amount || amount < 1 || amount > coinBalance) return;
              wrap.innerHTML = '<span class="rx-loading">…</span>';
              await addCoins(-amount);
              try{
                const sid = `${betId}:${myHandle}`;
                await sb.from('bet_supports').upsert({
                  id: sid, bet_id: betId, domain,
                  target_handle: p.handle, item_id: item.id,
                  supporter_handle: myHandle, supporter_name: profile.name,
                  amount, status:'pending'
                });
              }catch(e){ console.error('support bet failed', e); }
              await loadExisting();
            });
            wrap.querySelector('.bet-sup-cancel').addEventListener('click', ()=>loadExisting());
            return wrap;
          })());
        });
      });
    }catch(e){ document.getElementById('betExisting').innerHTML = ''; }
  }

  loadExisting();

  document.getElementById('betSubmit').addEventListener('click', async ()=>{
    const amount = parseInt(document.getElementById('betAmount').value, 10);
    const note = document.getElementById('betNote').value.trim();
    const err = document.getElementById('betErr');
    if(!amount || amount < 1){ err.textContent = 'Укажи сумму ставки.'; return; }
    if(amount > coinBalance){ err.textContent = 'Недостаточно Добрикоин.'; return; }
    if(!note){ err.textContent = 'Напиши, на что ставишь.'; return; }
    await addCoins(-amount);
    try{
      await sb.from('coin_bets').insert({
        domain, target_handle: p.handle, item_id: item.id, item_title: item.title,
        bettor_handle: myHandle, bettor_name: profile.name, amount, note,
        status: 'pending', created_at: Date.now()
      });
    }catch(e){ console.error('bet insert failed', e); }
    closeModal();
    loadFriendsActivity();
  });
}

async function loadBetsToResolve(){
  const side = document.getElementById('activitySide');
  if(!side) return;
  let box = document.getElementById('resolveBox');
  if(!myHandle){ if(box) box.remove(); return; }
  let pending = [], supports = [];
  try{
    const [{ data: bets }, { data: sups }] = await Promise.all([
      sb.from('coin_bets').select('*').eq('domain', domain).eq('target_handle', myHandle).eq('status','pending'),
      sb.from('bet_supports').select('*').eq('domain', domain).eq('target_handle', myHandle).eq('status','pending')
    ]);
    pending = bets || [];
    supports = sups || [];
  }catch(e){ console.error('loadBetsToResolve failed', e); }

  // Группируем поддержки по bet_id
  const supMap = {};
  supports.forEach(s=>{ (supMap[s.bet_id] = supMap[s.bet_id]||[]).push(s); });

  const stillActive = [];
  const resolvable = [];
  pending.forEach(b=>{
    const g = games.find(x=>x.id===b.item_id);
    if(!g) return;
    if(g.status === activeStatus()) stillActive.push(b); else resolvable.push(b);
  });

  if(!box){
    box = document.createElement('div');
    box.id = 'resolveBox';
    box.className = 'resolve-box';
    side.appendChild(box);
  }
  if(stillActive.length === 0 && resolvable.length === 0){ box.innerHTML = ''; return; }

  let html = '';
  if(stillActive.length){
    const byItem = {};
    stillActive.forEach(b=>{
      (byItem[b.item_id] = byItem[b.item_id] || { title:b.item_title, bets:[] }).bets.push(b);
    });
    html += `<h4>🎲 Ставки на ${domain==='games'?'твою игру':'твой просмотр'}</h4>` + Object.values(byItem).map(g=>`
      <div class="resolve-item">
        <div class="resolve-top"><b>${esc(g.title)}</b></div>
        ${g.bets.map(b=>{
          const sups = supMap[b.id] || [];
          const supLine = sups.length ? `<div class="stake-sups">${sups.map(s=>
            `<span class="stake-sup-pill">${esc(s.supporter_name||s.supporter_handle)} +${s.amount}🟡</span>`
          ).join('')}</div>` : '';
          return `<div class="stake-row mono">${esc(b.bettor_name||b.bettor_handle)} — ${b.amount} 🟡${sups.length?` <span class="stake-total">(итого ${b.amount + sups.reduce((a,s)=>a+s.amount,0)} 🟡)</span>`:''}</div>${supLine}`;
        }).join('')}
        <div class="resolve-note">На что ставят — узнаешь, когда ${domain==='games'?'закроешь игру':'досмотришь фильм'}.</div>
      </div>`).join('');
  }
  if(resolvable.length){
    html += `<h4${stillActive.length ? ' style="margin-top:14px"' : ''}>🎲 Ставки на проверку</h4>` + resolvable.map(b=>{
      const sups = supMap[b.id] || [];
      const supLine = sups.length ? `<div class="stake-sups">${sups.map(s=>
        `<span class="stake-sup-pill">${esc(s.supporter_name||s.supporter_handle)} +${s.amount}🟡</span>`
      ).join('')}</div>` : '';
      const total = b.amount + sups.reduce((a,s)=>a+s.amount, 0);
      return `<div class="resolve-item">
        <div class="resolve-top"><b>${esc(b.bettor_name||b.bettor_handle)}</b> — ${b.amount} 🟡${sups.length?` <span class="stake-total">(итого ${total} 🟡)</span>`:''} на «${esc(b.item_title)}»</div>
        ${supLine}
        <div class="resolve-note">${esc(b.note||'')}</div>
        <div class="resolve-actions">
          <button class="resolve-win" data-id="${b.id}" data-win="1">✅ Выигрыш</button>
          <button class="resolve-lose" data-id="${b.id}" data-win="0">❌ Проигрыш</button>
        </div>
      </div>`;
    }).join('');
  }
  box.innerHTML = html;
  box.querySelectorAll('button[data-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>resolveBet(btn.dataset.id, btn.dataset.win==='1'));
  });
}
async function resolveBet(betId, win){
  try{
    const { data } = await sb.from('coin_bets').select('*').eq('id', betId).limit(1);
    const bet = data && data[0]; if(!bet) return;
    if(win){
      // Выплата основному ставщику
      const { data: profRow } = await sb.from('public_profiles').select('balance')
        .eq('id', bet.domain+':'+bet.bettor_handle).maybeSingle();
      const cur = (profRow && typeof profRow.balance === 'number') ? profRow.balance : COIN_START;
      await sb.from('public_profiles').update({ balance: cur + bet.amount*2 }).eq('id', bet.domain+':'+bet.bettor_handle);
      // Выплата поддержавшим ×2
      try{
        const { data: sups } = await sb.from('bet_supports').select('*').eq('bet_id', betId).eq('status','pending');
        for(const s of (sups||[])){
          const { data: sRow } = await sb.from('public_profiles').select('balance')
            .eq('id', s.domain+':'+s.supporter_handle).maybeSingle();
          const sc = (sRow && typeof sRow.balance==='number') ? sRow.balance : COIN_START;
          await sb.from('public_profiles').update({ balance: sc + s.amount*2 }).eq('id', s.domain+':'+s.supporter_handle);
        }
      }catch(e){}
    }
    await sb.from('coin_bets').update({ status: win?'won':'lost' }).eq('id', betId);
    await sb.from('bet_supports').update({ status: win?'won':'lost' }).eq('bet_id', betId);
  }catch(e){ console.error('resolveBet failed', e); }
  loadBetsToResolve();
  loadLeaderboard();
}

// Сайдбар "Сейчас играют/смотрят" — группировка по человеку, горизонтальный скролл
async function loadFriendsActivity(){
  const titleEl = document.getElementById('activityTitle');
  const listEl  = document.getElementById('activityList');
  if(!titleEl || !listEl) return;
  const verb = domain==='games' ? 'играют' : 'смотрят';
  const verbSingle = domain==='games' ? 'играет' : 'смотрит';
  titleEl.textContent = 'Сейчас ' + verb;
  listEl.innerHTML = '<div class="activity-empty mono">Загрузка…</div>';

  const profiles = await listProfiles();

  // Группируем по человеку
  const byPerson = [];
  profiles.forEach(p=>{
    if(myHandle && p.handle === myHandle) return;
    const items = (p.items||[]).filter(it=>it && it.status===activeStatus());
    if(items.length) byPerson.push({ p, items });
  });

  // Round-robin сортировка: у кого меньше активных — идёт первым (честнее)
  byPerson.sort((a,b)=>a.items.length - b.items.length);

  // Плоский кэш для ставок
  const rows = [];
  byPerson.forEach(({p, items})=>items.forEach(item=>rows.push({p, item})));
  activityRows = rows;

  let potByItem = {};
  try{
    const [{ data: bets }, { data: supports }] = await Promise.all([
      sb.from('coin_bets').select('*').eq('domain', domain).eq('status','pending'),
      sb.from('bet_supports').select('item_id,amount').eq('domain', domain).eq('status','pending')
    ]);
    (bets||[]).forEach(b=>{
      if(!potByItem[b.item_id]) potByItem[b.item_id] = { count:0, total:0, bets:[] };
      potByItem[b.item_id].count++; potByItem[b.item_id].total += b.amount;
      potByItem[b.item_id].bets.push(b);
    });
    // Прибавляем суммы поддержек к общему pot
    (supports||[]).forEach(s=>{
      if(potByItem[s.item_id]) potByItem[s.item_id].total += s.amount;
    });
  }catch(e){}

  if(byPerson.length === 0){
    listEl.innerHTML = `<div class="activity-empty mono">Пока никто из друзей ничего не ${verbSingle}.</div>`;
  } else {
    listEl.innerHTML = byPerson.map(({p, items})=>{
      const rowList = items.map(item=>{
        const rowIdx = rows.findIndex(r=>r.p.handle===p.handle && r.item.id===item.id);
        const pot = potByItem[item.id];
        const potBadge = pot ? `<span class="acc-pot">🎲 ${pot.total}🟡</span>` : '';
        const cover = item.cover
          ? `<img class="acc-cover" src="${esc(item.cover)}" alt="" onerror="this.style.display='none'">`
          : `<div class="acc-nocover">${domain==='games'?'🎮':'🎬'}</div>`;
        return `<div class="acc-row" data-idx="${rowIdx}">
          ${cover}
          <div class="acc-info">
            <div class="acc-title">${esc(item.title)}</div>
            ${item.genre?`<div class="acc-genre">${esc(item.genre)}</div>`:''}
            ${potBadge}
          </div>
          <button class="acc-bet-btn" data-idx="${rowIdx}" title="Поставить Добрикоин">🎲</button>
        </div>`;
      }).join('');

      return `<div class="acc-person">
        <div class="acc-head" data-open="0">
          <div class="activity-avatar act-av-sm">${esc(p.avatar||(domain==='games'?'🎮':'🎬'))}</div>
          <span class="acc-name">${esc(p.name||p.handle)}</span>
          <span class="act-person-cnt">${items.length}</span>
          <span class="acc-arrow">▾</span>
        </div>
        <div class="acc-body" style="display:none">${rowList}</div>
      </div>`;
    }).join('');

    // Аккордеон — раскрытие/закрытие
    listEl.querySelectorAll('.acc-head').forEach(head=>{
      head.addEventListener('click', ()=>{
        const body = head.nextElementSibling;
        const open = head.dataset.open === '1';
        head.dataset.open = open ? '0' : '1';
        body.style.display = open ? 'none' : 'block';
        head.querySelector('.acc-arrow').textContent = open ? '▾' : '▴';
      });
    });

    listEl.querySelectorAll('.acc-bet-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const { p, item } = activityRows[+btn.dataset.idx]||{};
        if(p && item) openBetModal(p, item);
      });
    });
    listEl.querySelectorAll('.acc-row').forEach(row=>{
      row.addEventListener('click', ()=>{
        const { p, item } = activityRows[+row.dataset.idx]||{};
        if(p && item){
          const list = p.items||[];
          list.__owner = p.handle;
          openDetail(item.id, list, true);
        }
      });
    });
  }
  loadBetsToResolve();
}

// Сайдбар "Недавние обзоры" — обзоры друзей, клик открывает полный обзор (как через "Друзья")
async function loadFriendsReviews(){
  const listEl = document.getElementById('reviewsList');
  if(!listEl) return;
  listEl.innerHTML = '<div class="activity-empty mono">Загрузка…</div>';
  const profiles = await listProfiles();
  const reviews = [];
  profiles.forEach(p=>{
    if(myHandle && p.handle === myHandle) return;
    (p.items||[]).forEach(it=>{
      if(it && completedStatuses().includes(it.status) && it.review && it.review.trim()) reviews.push({ p, item: it });
    });
  });
  reviews.sort((a,b)=>(b.item.added||0)-(a.item.added||0));
  const top = reviews.slice(0, 4);
  if(top.length === 0){
    listEl.innerHTML = `<div class="activity-empty mono">Пока нет обзоров от друзей.</div>`;
    return;
  }

  // Пакетная загрузка реакций для всех обзоров одним запросом
  let rxMap = {}; // { 'owner:itemId': { emoji: count } }
  try{
    const ids = top.map(({p,item})=>`${domain}:${p.handle}:${item.id}:*`);
    // Supabase не поддерживает wildcard, грузим по owner+item_id через or
    const filters = top.map(({p,item})=>`and(owner.eq.${p.handle},item_id.eq.${item.id})`).join(',');
    const { data } = await sb.from('reactions').select('owner,item_id,emoji')
      .eq('domain', domain).or(filters);
    (data||[]).forEach(r=>{
      const k = `${r.owner}:${r.item_id}`;
      if(!rxMap[k]) rxMap[k] = {};
      rxMap[k][r.emoji] = (rxMap[k][r.emoji]||0) + 1;
    });
  }catch(e){ /* реакции недоступны — покажем без них */ }

  listEl.innerHTML = top.map(({p, item}, idx)=>{
    const t = tierOf(item.score);
    const raw = item.review.trim();
    const snippet = esc(raw.length > 110 ? raw.slice(0,110)+'…' : raw);
    const rxKey = `${p.handle}:${item.id}`;
    const rxCounts = rxMap[rxKey] || {};
    const rxHTML = REACTION_EMOJIS
      .filter(e => rxCounts[e] > 0)
      .map(e => `<span class="rx-pill">${e}<b>${rxCounts[e]}</b></span>`)
      .join('');
    return `
      <div class="review-item" data-idx="${idx}">
        <div class="review-top">
          <div class="activity-avatar" style="width:26px;height:26px;font-size:13px">${esc(p.avatar||(domain==='games'?'🎮':'🎬'))}</div>
          <div class="review-name">${esc(p.name||p.handle)}</div>
          <div class="review-score" style="color:${t.color}">${item.score.toFixed(1)}</div>
        </div>
        <div class="review-title">${esc(item.title)}</div>
        <div class="review-snippet">${snippet}</div>
        ${rxHTML ? `<div class="rx-pills">${rxHTML}</div>` : ''}
      </div>`;
  }).join('');

  listEl.querySelectorAll('.review-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const { p, item } = top[+el.dataset.idx];
      const list = p.items || [];
      list.__owner = p.handle;
      openDetail(item.id, list, true);
    });
  });
}

async function loadRecentCollections(){
  const el = document.getElementById('recentCollsList');
  if(!el) return;
  el.innerHTML = '<div class="activity-empty mono">Загрузка…</div>';
  const profiles = await listProfiles();
  const entries = [];
  profiles.forEach(p=>{
    if(myHandle && p.handle === myHandle) return;
    if(p.domain !== domain) return;  // только текущий домен
    (p.collections||[]).forEach(c=>{ if(c && c.title) entries.push({ p, coll:c }); });
  });
  entries.sort((a,b)=>(b.coll.created||0)-(a.coll.created||0));
  const top = entries.slice(0, 2);
  if(!top.length){ el.innerHTML = '<div class="activity-empty mono">Пока нет коллекций от друзей.</div>'; return; }
  el.innerHTML = top.map(({p, coll}, idx)=>{
    const saved = games; games = p.items||[];
    const preview = collageHTML(coll);
    games = saved;
    const cnt = (coll.itemIds||[]).length;
    return `<div class="rc-item" data-idx="${idx}" data-owner="${esc(p.handle)}" data-coll-id="${esc(coll.id)}">
      <div class="rc-collage">${preview}</div>
      <div class="rc-info">
        <div class="rc-who">
          <span class="activity-avatar" style="width:18px;height:18px;font-size:11px;display:inline-grid;place-items:center;border-radius:5px;background:var(--ink2);border:1px solid var(--line);vertical-align:middle">${esc(p.avatar||'🎮')}</span>
          <span class="rc-name">${esc(p.name||p.handle)}</span>
        </div>
        <div class="rc-title">${esc(coll.title)}</div>
        <div class="rc-cnt">${cnt} ${domain==='movies'?'фильм':'игр'}${cnt===1?'а':cnt<5?'ы':''}</div>
        <div class="card-rx" data-item-id="coll:${esc(coll.id)}"></div>
      </div>
    </div>`;
  }).join('');

  // Загружаем реакции для каждой коллекции от её владельца
  for(const {p, coll} of top){
    const cell = el.querySelector(`.card-rx[data-item-id="coll:${coll.id}"]`);
    if(!cell) continue;
    try{
      const { data } = await sb.from('reactions').select('emoji')
        .eq('domain', domain).eq('owner', p.handle).eq('item_id', 'coll:'+coll.id);
      const counts = {};
      (data||[]).forEach(r=>{ counts[r.emoji] = (counts[r.emoji]||0)+1; });
      const pills = REACTION_EMOJIS.filter(e=>counts[e]>0)
        .map(e=>`<span class="rx-pill">${e}<b>${counts[e]}</b></span>`).join('');
      cell.innerHTML = pills;
    }catch(e){}
  }

  el.querySelectorAll('.rc-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const { p, coll } = top[+item.dataset.idx];
      const saved = games; games = p.items||[];
      openCollectionDetail(coll, true, p.handle);
      games = saved;
    });
  });
}

async function switchDomain(dom){
  if(dom === domain) return;
  itemsStore[domain] = games; handleStore[domain] = myHandle; balanceStore[domain] = coinBalance;
  collectionsStore[domain] = collections;
  domain = dom;
  games = itemsStore[domain]; myHandle = handleStore[domain];
  collections = collectionsStore[domain]; coinBalance = balanceStore[domain];
  collections = collectionsStore[domain];
  searchQuery = ''; statusFilter = 'all'; currentView = 'me'; boardTab = 'reviews';
  document.body.dataset.domain = domain;
  render();
  loadFriendsActivity();
  loadFriendsReviews();
  loadRecentCollections();
  coinBalance = await loadCoinBalance();
  balanceStore[domain] = coinBalance;
  const pulled = await syncFromCloud(domain);
  if(pulled) render(); else {
    const badge = document.getElementById('coinStatNum');
    if(badge) badge.textContent = coinBalance;
  }
}

const AVATARS = ['🎮','👾','🕹️','🎯','🏆','🐉','⚔️','🛸','🍄','💀','🦊','🤖'];

const TIERS = [
  { key:'S', label:'9.0+',    min:9.0, color:'var(--s)' },
  { key:'A', label:'8.0–8.9', min:8.0, color:'var(--a)' },
  { key:'B', label:'6.5–7.9', min:6.5, color:'var(--b)' },
  { key:'C', label:'5.0–6.4', min:5.0, color:'var(--c)' },
  { key:'D', label:'3.0–4.9', min:3.0, color:'var(--d)' },
  { key:'F', label:'0–2.9',   min:0.0, color:'var(--f)' },
];
function tierOf(score){ for(const t of TIERS){ if(score >= t.min) return t; } return TIERS[TIERS.length-1]; }
function tierColorVar(key){ return 'var(--'+key.toLowerCase()+')'; }

function esc(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// Чипы-фильтры по статусу со счётчиками. active — текущий выбранный ('all' или статус).
function statusChipsHTML(list, active){
  const S = statusList();
  const counts = {}; S.forEach(s=>counts[s]=0);
  list.forEach(g=>{ if(counts[g.status]!==undefined) counts[g.status]++; });
  let chips = `<button class="chip ${active==='all'?'active':''}" data-st="all">Все <b>${list.length}</b></button>`;
  S.forEach(s=>{
    const c = counts[s];
    chips += `<button class="chip ${active===s?'active':''} ${c===0?'zero':''}" data-st="${esc(s)}">
      <span class="dot" style="background:${statusColor(s)}"></span>${esc(s)} <b>${c}</b></button>`;
  });
  return `<div class="chips">${chips}</div>`;
}

function openShop(){
  const owned = new Set(ownedList());
  const c = cos();
  const body = SHOP_CATS.map(cat=>{
    const cards = SHOP.filter(x=>x.cat===cat.key).map(it=>{
      const isOwned = owned.has(it.id);
      const isEq = c[cat.key] === it.id;
      let action;
      if(!isOwned){
        const can = coinBalance >= it.price;
        action = `<button class="btn sm shop-buy${can?'':' disabled'}" data-buy="${it.id}" ${can?'':'disabled'}>${it.price} 🟡</button>`;
      } else if(isEq){
        action = `<button class="btn ghost sm shop-equip" data-equip="${it.id}" data-cat="${cat.key}">Снять</button>`;
      } else {
        action = `<button class="btn sm shop-equip" data-equip="${it.id}" data-cat="${cat.key}">Надеть</button>`;
      }
      return `<div class="shop-item${isEq?' equipped':''}">
        ${shopPreview(it)}
        <div class="shop-lbl">${esc(it.label)}</div>
        <div class="shop-act">${isOwned?'<span class="shop-owned">куплено</span>':''}${action}</div>
      </div>`;
    }).join('');
    return `<div class="shop-cat"><div class="shop-cat-h">${esc(cat.label)}</div><div class="shop-grid">${cards}</div></div>`;
  }).join('');
  showModal(`
    <button class="close" onclick="__close()">×</button>
    <h3>🛒 Магазин Добрикоина</h3>
    <div class="shop-bal">Баланс: <b id="shopBal">${coinBalance}</b> 🟡</div>
    <p class="comm-note">Косметика за Добрикоин: рамка аватара, цвет имени, титул. Купленное можно бесплатно надевать и снимать — и его видят друзья в твоём профиле.</p>
    ${body}
  `);
  document.querySelectorAll('.shop-buy').forEach(b=>{
    if(b.disabled) return;
    b.addEventListener('click', async ()=>{
      const it = shopItem(b.dataset.buy);
      if(!it || coinBalance < it.price) return;
      await addCoins(-it.price);
      profile.owned = [...ownedList(), it.id];
      profile.cosmetics = { ...cos(), [it.cat]: it.id };   // сразу надеваем купленное
      await saveProfile(profile);
      render(); openShop();
    });
  });
  document.querySelectorAll('.shop-equip').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.equip, cat = b.dataset.cat, cur = cos();
      profile.cosmetics = { ...cur, [cat]: (cur[cat]===id ? null : id) };
      await saveProfile(profile);
      render(); openShop();
    });
  });
}

function statsHTML(list, coin, live){
  const count = list.length;
  const rated = list.filter(g => g.status === doneStatus());
  const avg = rated.length ? (rated.reduce((a,g)=>a+g.score,0)/rated.length) : 0;
  const tierIdx = k => TIERS.findIndex(t=>t.key===k);
  const topTier = rated.length ? rated.reduce((best,g)=>{ const k=tierOf(g.score).key; return tierIdx(k) < tierIdx(best) ? k : best; }, 'F') : '—';
  const played = rated.length;
  const coinStat = (coin === null || coin === undefined) ? '' :
    `<div class="stat"><div class="num"${live?' id="coinStatNum"':''}>${coin}</div><div class="lab">🟡 Добрикоин</div></div>`;
  return `
    <div class="stat"><div class="num">${count}</div><div class="lab">Обзоров</div></div>
    <div class="stat"><div class="num">${rated.length?avg.toFixed(1):'—'}</div><div class="lab">Средний балл</div></div>
    <div class="stat"><div class="num">${topTier}</div><div class="lab">Высший тир</div></div>
    <div class="stat"><div class="num">${played}</div><div class="lab">${esc(L().statPlayed)}</div></div>
    ${coinStat}`;
}

// Одна карточка игры. opts: {readonly, showStatus, statusDot, noReviewTag}
function cardHTML(g, opts){
  opts = opts || {};
  const t = tierOf(g.score);
  const scoreColor = g.cover ? '#fff' : t.color;
  const cover = g.cover ? `<div class="cov"><img src="${esc(g.cover)}" alt="" loading="lazy" onerror="this.closest('.cov').style.display='none';this.closest('.card').classList.remove('has-cover')"></div>` : '';
  let tags = '';
  if(opts.showStatus !== false && g.status){
    const dot = opts.statusDot ? `<span class="sdot" style="background:${statusColor(g.status)}"></span>` : '';
    tags += `<div class="cstatus">${dot}${esc(g.status)}</div>`;
  }
  if(opts.noReviewTag && !(g.review && g.review.trim())){
    tags += `<div class="cstatus noreview">без обзора</div>`;
  }
  return `<div class="card ${g.cover?'has-cover':''}" data-id="${g.id}" data-ro="${opts.readonly?1:0}">
    ${cover}
    <div class="card-body">
      <div class="cs" style="color:${scoreColor}">${g.score.toFixed(1)}</div>
      <div class="ct">${esc(g.title)}</div>
      ${g.genre?`<div class="cg">${esc(g.genre)}</div>`:''}
      ${tags}
      <div class="card-rx" data-item-id="${g.id}"></div>
    </div>
  </div>`;
}

// Тир-борд для любого списка игр. readonly=true — без кликов на редактирование.
// hideEmpty=true — прятать тиры без совпадений (для режима поиска).
function tierBoardHTML(list, readonly, hideEmpty){
  if(list.length === 0){
    return `<div class="empty-all"><b>Здесь пока пусто</b>${readonly?esc(L().friendEmpty):esc(L().firstReview)}</div>`;
  }
  let html = '';
  for(const t of TIERS){
    const inTier = list.filter(g=>tierOf(g.score).key===t.key).sort((a,b)=>b.score-a.score);
    if(hideEmpty && inTier.length===0) continue;
    html += `<div class="tier">
      <div class="tier-badge" style="background:${t.color}"><span>${t.key}</span><small>${t.label}</small></div>
      <div class="tier-row">`;
    if(inTier.length===0){
      html += `<div class="tier-empty">— пусто —</div>`;
    } else {
      for(const g of inTier){ html += cardHTML(g, {readonly}); }
    }
    html += `</div></div>`;
  }
  return html;
}

  if(editBtn) editBtn.addEventListener('click', openProfileEdit);

  if(nameDisp) nameDisp.addEventListener('click', openProfileEdit);

  document.querySelectorAll('.domain-switch button').forEach(b=>{
    b.addEventListener('click', ()=>switchDomain(b.dataset.dom));
  });
  document.querySelectorAll('.nav button').forEach(b=>{
    b.addEventListener('click', ()=>{ currentView = b.dataset.view; render(); });
  });
  document.querySelectorAll('.btab').forEach(b=>{
    b.addEventListener('click', ()=>{ boardTab = b.dataset.tab; render(); });

  if(addBtn) addBtn.addEventListener('click', ()=>{ boardTab==='collections' ? openCollectionForm() : openForm(); });

  const shareBtn = document.getElementById('shareLinkBtn');

    const url = shareLink();
    try{
      await navigator.clipboard.writeText(url);
      const orig = shareBtn.textContent;
      shareBtn.textContent = 'Скопировано!';
      setTimeout(()=>{ shareBtn.textContent = orig; }, 1500);

// Универсальная отрисовка доски в элемент el.
// opts: {readonly, query, status}. Без поиска и со status='all' — секционный вид.
function fillBoard(el, list, opts){
  opts = opts || {};
  const readonly = !!opts.readonly;
  const status = opts.status || 'all';
  const q = (opts.query||'').trim().toLowerCase();
  if(!el) return;
  if(list.length === 0){ el.innerHTML = tierBoardHTML([], readonly); return; }

  // --- Сфокусированный режим: активен поиск или выбран конкретный статус ---
  if(q || status !== 'all'){
    let base = status==='all' ? list : list.filter(g=>g.status===status);
    const filtered = q ? base.filter(g => g.title.toLowerCase().includes(q) || (g.genre||'').toLowerCase().includes(q)) : base;
    if(filtered.length === 0){
      const msg = q
        ? `<b>Ничего не найдено</b>По запросу «${esc(opts.query.trim())}»${status!=='all'?` среди «${esc(status)}»`:''} игр нет.`
        : `<b>Пусто</b>Нет игр со статусом «${esc(status)}».`;
      el.innerHTML = `<div class="empty-all">${msg}</div>`;
      return;
    }
    el.innerHTML = `<div class="search-count">Показано: ${filtered.length}</div>` + tierBoardHTML(filtered, readonly, true);
    wireCards(el, list, readonly, opts.onBack);
    return;
  }

  // --- Секционный вид по умолчанию ---
  const backl = backlogStatuses();
  const playing   = list.filter(g=>g.status===activeStatus());
  const completed = list.filter(g=>completedStatuses().includes(g.status));
  const backlog   = list.filter(g=>backl.includes(g.status));
  let html = '';

  if(playing.length){
    html += `<div class="now-playing">
      <div class="block-head"><span class="np-live"></span><h3>${esc(L().nowPlaying)}</h3><span class="cnt">${playing.length}</span></div>
      <div class="block-grid">${playing.map(g=>cardHTML(g,{readonly,showStatus:false,noReviewTag:true})).join('')}</div>
    </div>`;
  }

  html += `<div class="section-label">${esc(L().ranking)}</div>`;
  if(completed.length){
    html += tierBoardHTML(completed, readonly, false);
  } else {
    html += `<div class="empty-all" style="padding:28px 20px"><b>${esc(L().emptyCompletedTitle)}</b>${readonly?esc(L().emptyCompletedFriend):esc(L().emptyCompletedSelf)}</div>`;
  }

  if(backlog.length){
    html += `<div class="section-label">Полка на потом</div>
      <div class="backlog">
        <div class="block-head"><h3 style="font-size:16px">Отложено · в планах</h3>
          ${readonly?'':`<button class="btn sm" id="rouletteBtn" style="margin-left:auto">${esc(L().rouletteBtn)}</button>`}
          <span class="cnt" style="margin-left:${readonly?'auto':'12px'}">${backlog.length}</span></div>
        <div class="block-grid">${backlog.map(g=>cardHTML(g,{readonly,statusDot:true})).join('')}</div>
      </div>`;
  }

  el.innerHTML = html;
  wireCards(el, list, readonly, opts.onBack);
  const rb = el.querySelector('#rouletteBtn');
  if(rb) rb.addEventListener('click', openRoulette);
}

function wireCards(el, list, readonly, onBack){

// Если в адресе есть ?u=ник — открывает профиль этого игрока поверх текущего интерфейса,
// подтягивая его прямо из public_profiles (без похода в общую витрину).
async function openSharedProfileFromURL(){
  let params;
  try{ params = new URLSearchParams(location.search); }catch(e){ return; }
  const handle = (params.get('u')||'').trim();
  if(!handle) return;
  const dParam = params.get('d');
  const dom = (dParam && DOMAINS[dParam]) ? dParam : domain;
  if(dom !== domain) await switchDomain(dom);
  if(myHandle && handle === myHandle) return; // это ссылка на самого себя — ничего поверх не открываем
  try{
    const { data, error } = await sb.from('public_profiles').select('*').eq('id', dom+':'+handle).maybeSingle();
    if(error || !data){
      showModal(`
        <button class="close" onclick="__close()">×</button>
        <h3>Профиль не найден</h3>

    openFriendProfile(data);
  }catch(e){ console.error('openSharedProfileFromURL failed', e); }
}
