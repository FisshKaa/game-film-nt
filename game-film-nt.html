<!-- Персональный игровой рейтинг: профиль, обзоры, тир-лист -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --ink:#0e0e16; --ink2:#14141f; --surface:#1a1a28; --surface2:#22222f;
    --line:#2c2c3d; --text:#eae8f4; --muted:#928fab; --muted2:#6b6882;
    --accent:#f5b942; --accent-dim:#a37a1f;
    --s:#ff477e; --a:#ff8c42; --b:#ffd23f; --c:#4ade80; --d:#38bdf8; --f:#94a3b8;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1100px 600px at 78% -8%, #201a2e 0%, transparent 55%),
      radial-gradient(900px 500px at -5% 110%, #17222b 0%, transparent 50%),
      var(--ink);
    color:var(--text); font-family:'Hanken Grotesk',system-ui,sans-serif;
    line-height:1.5; min-height:100vh; padding:22px 16px 60px;
  }
  body[data-domain="movies"]{
    --accent:#8b7bff; --accent-dim:#4a3f92;
    background:
      radial-gradient(1100px 600px at 78% -8%, #211a35 0%, transparent 55%),
      radial-gradient(900px 500px at -5% 110%, #141f2e 0%, transparent 50%),
      var(--ink);
  }
  .wrap{max-width:940px;margin:0 auto}
  .mono{font-family:'Space Mono',monospace}

  /* ---------- Friends activity sidebar ---------- */
  .layout{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:250px 1fr;gap:22px;align-items:start}
  .layout > .wrap{max-width:none;margin:0}
  .activity-side{
    position:sticky; top:20px;
    background:linear-gradient(180deg,var(--ink2),var(--surface));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; max-height:calc(100vh - 40px); overflow:auto;
  }
  .activity-side h3{
    font-family:'Bricolage Grotesque',sans-serif; font-size:13px; font-weight:800;
    letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;
  }
  .activity-refresh{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:11px;border-radius:8px;padding:3px 8px;margin-bottom:12px;cursor:pointer;
  }
  .activity-refresh:hover{color:var(--text);border-color:var(--accent-dim)}
  .activity-empty{font-size:12.5px;color:var(--muted2);line-height:1.5}
  .activity-item{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .activity-item:last-child{border-bottom:none}
  .activity-avatar{
    width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:19px;flex-shrink:0;
    background:radial-gradient(circle at 30% 25%,#2f2a45,#191527); border:1px solid var(--line);
  }
  .activity-info{min-width:0}
  .activity-name{font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .activity-game{font-size:12px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .activity-more{font-size:11px;color:var(--muted2);margin-left:4px}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr}
    .activity-side{position:static;max-height:none;order:2;margin-top:16px}
  }

  /* Domain switch + movies palette */
  .domain-switch{display:flex;gap:6px;margin:0 0 16px;background:var(--ink2);border:1px solid var(--line);
    border-radius:12px;padding:5px;width:fit-content}
  .domain-switch button{background:transparent;color:var(--muted);font-size:14px;font-weight:700;
    padding:8px 16px;border-radius:8px;font-family:'Bricolage Grotesque',sans-serif;transition:background .15s,color .15s}
  .domain-switch button.active{background:var(--accent);color:#12121a}
  .domain-switch button:hover:not(.active){color:var(--text)}

  /* ---------- Profile header ---------- */
  .profile{
    position:relative; background:linear-gradient(180deg,var(--ink2),var(--surface));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:26px 26px 22px; overflow:hidden;
  }
  .profile::before{
    content:""; position:absolute; inset:0; opacity:.5; pointer-events:none;
    background:
      repeating-linear-gradient(115deg, transparent 0 22px, rgba(245,185,66,.03) 22px 23px);
  }
  .p-top{display:flex; gap:18px; align-items:center; position:relative}
  .avatar{
    width:74px;height:74px;border-radius:20px;flex-shrink:0;
    display:grid;place-items:center;font-size:38px; cursor:pointer;
    background:radial-gradient(circle at 30% 25%,#2f2a45,#191527);
    border:1px solid var(--line); transition:transform .15s, border-color .15s;
    user-select:none;
  }
  .avatar:hover{transform:translateY(-2px);border-color:var(--accent-dim)}
  .p-id{flex:1;min-width:0}
  .p-name{
    font-family:'Bricolage Grotesque',sans-serif; font-weight:800;
    font-size:clamp(24px,5vw,34px); line-height:1.05; letter-spacing:-.02em;
    background:transparent;border:none;color:var(--text);width:100%;
    outline:none; border-bottom:2px solid transparent; padding:2px 0;
  }
  .p-name:focus{border-bottom-color:var(--accent-dim)}
  .p-tag{
    background:transparent;border:none;color:var(--muted);width:100%;
    font-size:14px; outline:none; margin-top:4px; padding:2px 0;
    border-bottom:1px solid transparent;
  }
  .p-tag:focus{border-bottom-color:var(--line)}
  .edit-hint{font-size:11px;color:var(--muted2);margin-top:2px}

  .stats{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    margin-top:20px; position:relative;
  }
  .stat{
    background:var(--ink); border:1px solid var(--line); border-radius:12px;
    padding:12px 12px 10px; text-align:left;
  }
  .stat .num{font-family:'Space Mono',monospace;font-size:23px;font-weight:700;color:var(--accent);line-height:1}
  .stat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}

  /* ---------- Toolbar ---------- */
  .bar{display:flex;gap:10px;align-items:center;margin:22px 0 16px;flex-wrap:wrap}
  .bar h2{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:19px;letter-spacing:-.01em;margin-right:auto;
  }
  button{font-family:inherit;cursor:pointer;border:none}
  .btn{
    background:var(--accent);color:#241a05;font-weight:600;font-size:14px;
    padding:11px 18px;border-radius:11px;transition:transform .12s,filter .12s;
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--muted2)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.armed{background:var(--s)!important;color:#fff!important;border-color:var(--s)!important}
  .foot button.armed{color:var(--s);font-weight:700}

  /* ---------- Search ---------- */
  .search{
    background:var(--ink);border:1px solid var(--line);border-radius:11px;
    color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;
    flex:1;min-width:150px;max-width:300px;transition:border-color .15s;
  }
  .search:focus{border-color:var(--accent-dim)}
  .search::placeholder{color:var(--muted2)}
  .search-count{font-size:12px;color:var(--muted2);margin:-4px 2px 12px}

  /* ---------- Status filter chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
  .chip{background:var(--ink2);border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:22px;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,color .15s,background .15s}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .chip b{font-family:'Space Mono',monospace;font-weight:700;color:var(--text)}
  .chip.active{background:var(--surface2);border-color:var(--accent-dim);color:var(--text)}
  .chip:hover:not(.active){border-color:var(--muted2);color:var(--text)}
  .chip.zero{opacity:.5}

  /* ---------- Sectioned layout ---------- */
  .section-label{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:26px 2px 12px;
    display:flex;align-items:center;gap:12px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--line)}

  .now-playing{
    background:linear-gradient(180deg,rgba(245,185,66,.09),rgba(245,185,66,.02));
    border:1px solid var(--accent-dim);border-radius:var(--radius);padding:16px 16px 14px;
  }
  .block-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .block-head h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px}
  .block-head .cnt{font-family:'Space Mono',monospace;color:var(--muted2);font-size:12px;margin-left:auto}
  .np-live{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 rgba(245,185,66,.5);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,185,66,.45)}70%{box-shadow:0 0 0 9px rgba(245,185,66,0)}100%{box-shadow:0 0 0 0 rgba(245,185,66,0)}}
  .block-grid{display:flex;flex-wrap:wrap;gap:10px}

  .backlog{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px}
  .backlog .card{background:var(--ink)}

  .cstatus.noreview{border-color:var(--accent-dim);color:var(--accent)}
  .cstatus .sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

  @media(prefers-reduced-motion:reduce){ .np-live{animation:none} }

  /* ---------- Tabs / nav ---------- */
  .nav{display:flex;gap:6px;margin:18px 0 4px;background:var(--ink2);
    border:1px solid var(--line);border-radius:12px;padding:5px;width:fit-content}
  .nav button{background:transparent;color:var(--muted);font-size:14px;font-weight:600;
    padding:8px 18px;border-radius:8px;transition:background .15s,color .15s}
  .nav button.active{background:var(--surface2);color:var(--text)}
  .nav button:hover:not(.active){color:var(--text)}

  /* ---------- Community ---------- */
  .comm-note{font-size:13px;color:var(--muted);margin:2px 0 16px;line-height:1.5}
  .friends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:16px;cursor:pointer;transition:transform .13s,border-color .13s;display:flex;gap:13px;align-items:center}
  .fcard:hover{transform:translateY(-3px);border-color:var(--muted2)}
  .fcard .fav{width:50px;height:50px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;
    font-size:26px;background:radial-gradient(circle at 30% 25%,#2f2a45,#191527);border:1px solid var(--line)}
  .fcard .fn{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;line-height:1.1}
  .fcard .fm{font-size:12px;color:var(--muted);margin-top:3px}
  .fcard.me-tag .fn::after{content:'ты';font-family:'Space Mono',monospace;font-size:10px;
    background:var(--accent-dim);color:#12121a;padding:1px 6px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .fmodal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0 6px}
  .fmodal-stats .stat{padding:10px}
  .fmodal-stats .num{font-size:19px}

  /* ---------- Tier board ---------- */
  .tier{
    display:grid; grid-template-columns:64px 1fr; gap:12px; margin-bottom:12px;
    align-items:stretch;
  }
  .tier-badge{
    border-radius:13px;display:grid;place-items:center;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;
    color:#12121a; position:relative;
  }
  .tier-badge span{position:relative;z-index:1}
  .tier-badge small{
    position:absolute;bottom:6px;left:0;right:0;text-align:center;
    font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
    color:rgba(18,18,26,.65);letter-spacing:.03em;
  }
  .tier-row{
    background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:10px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start;
    min-height:74px;
  }
  .tier-empty{color:var(--muted2);font-size:13px;align-self:center;padding:0 6px;font-style:italic}

  .card{
    background:var(--ink2);border:1px solid var(--line);border-radius:11px;
    min-width:150px;max-width:220px;cursor:pointer;overflow:hidden;
    transition:transform .13s,border-color .13s;position:relative;flex:1;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--muted2)}
  .card .cov{width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden}
  .card .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .card-body{padding:11px 13px;position:relative}
  .card .ct{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;line-height:1.2;padding-right:46px}
  .card .cg{font-size:11.5px;color:var(--muted);margin-top:3px}
  .card .cs{
    position:absolute;top:11px;right:13px;font-family:'Space Mono',monospace;
    font-weight:700;font-size:16px;
  }
  .card.has-cover .cs{
    top:9px;right:9px;padding:2px 7px;border-radius:7px;font-size:14px;
    background:rgba(10,10,18,.78);
  }
  .card.has-cover .cs{position:absolute}
  .card .cstatus{
    display:inline-block;margin-top:8px;font-size:10px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--muted2);border:1px solid var(--line);
    padding:2px 7px;border-radius:20px;
  }

  .empty-all{
    text-align:center;padding:52px 20px;border:1px dashed var(--line);
    border-radius:var(--radius);color:var(--muted);
  }
  .empty-all b{display:block;font-family:'Bricolage Grotesque',sans-serif;
    color:var(--text);font-size:18px;font-weight:700;margin-bottom:6px}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(6,6,12,.72);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:28px 14px;
    z-index:50;overflow-y:auto;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    width:100%;max-width:540px;padding:24px;position:relative;
    animation:pop .18s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .modal h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:21px;margin-bottom:16px}
  .close{position:absolute;top:16px;right:16px;background:var(--surface2);color:var(--muted);
    width:32px;height:32px;border-radius:9px;font-size:18px;line-height:1;border:1px solid var(--line)}
  .close:hover{color:var(--text)}
  .modal-back{margin-bottom:16px}

  /* ---------- Roulette ---------- */
  .rl-picks{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 16px}

  /* ---------- Wheel ---------- */
  .rl-controls{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 2px;color:var(--muted);font-size:13px}
  .rl-secs{width:76px;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-family:'Space Mono',monospace;font-size:15px;padding:8px 10px;text-align:center;outline:none}
  .rl-secs:focus{border-color:var(--accent-dim)}
  .wheel-wrap{position:relative;width:290px;max-width:88%;margin:14px auto 6px;aspect-ratio:1}
  .wheel-rot{width:100%;height:100%;transform:rotate(0deg);will-change:transform}
  .wheel-rot svg{display:block;width:100%;height:100%}
  .wheel-pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;
    border-left:13px solid transparent;border-right:13px solid transparent;border-top:22px solid var(--accent);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.55))}
  .wheel-empty{display:grid;place-items:center;height:100%;color:var(--muted2);font-size:13px;text-align:center;padding:20px}
  .rl-music{display:flex;align-items:center;gap:8px;margin:2px 0 2px}
  .rl-music input{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-family:inherit;font-size:13px;padding:8px 11px;outline:none}
  .rl-music input:focus{border-color:var(--accent-dim)}
  .rl-music .mnote{font-size:16px}
  .yt-host{position:fixed;left:-10000px;top:0;width:320px;height:180px;opacity:0;pointer-events:none}
  .yt-host iframe{width:320px;height:180px;border:0}

  /* ---------- Wheel center ---------- */
  .wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;
    width:66px;height:66px;border-radius:50%;display:grid;place-items:center;overflow:hidden;
    background:var(--ink2);border:2px solid var(--accent)}
  .wheel-center:empty{border:none;background:none}
  .wc-emoji{font-size:34px;line-height:1;display:block}
  .wc-img{width:100%;height:100%;object-fit:cover}
  .wc-shape{width:34px;height:34px;border-radius:8px;display:block;
    background:conic-gradient(from 0deg,var(--s),var(--a),var(--b),var(--c),var(--d),var(--s))}
  .wheel-center.dancing .wc-emoji{animation:wc-dance .6s ease-in-out infinite}
  .wheel-center.dancing .wc-shape{animation:wc-spin .8s linear infinite}
  .wheel-center.dancing .wc-img{animation:wc-bob .7s ease-in-out infinite}
  @keyframes wc-dance{0%,100%{transform:translateY(0) rotate(-13deg) scale(1)}50%{transform:translateY(-4px) rotate(13deg) scale(1.14)}}
  @keyframes wc-spin{to{transform:rotate(360deg)}}
  @keyframes wc-bob{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @media(prefers-reduced-motion:reduce){.wheel-center.dancing .wc-emoji,.wheel-center.dancing .wc-shape,.wheel-center.dancing .wc-img{animation:none}}

  .rl-center-pick{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:8px 0 2px}
  .rl-center-pick .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-right:2px}
  .cbtn{width:38px;height:38px;border-radius:10px;background:var(--ink);border:1px solid var(--line);
    font-size:19px;display:grid;place-items:center;color:var(--text)}
  .cbtn:hover{border-color:var(--muted2)}
  .cbtn.sel{border-color:var(--accent);background:var(--surface2)}
  .cbtn .mini-shape{width:18px;height:18px;border-radius:5px;
    background:conic-gradient(from 0deg,var(--s),var(--b),var(--c),var(--d),var(--s))}
  .center-img-row{width:100%;margin-top:6px;display:none}
  .center-img-row.show{display:block}
  .center-img-row input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:9px;
    color:var(--text);font-size:13px;padding:8px 11px;outline:none}
  .center-img-row input:focus{border-color:var(--accent-dim)}
  .reel-wrap{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,var(--ink),var(--ink2));padding:14px 0;margin:6px 0 4px}
  .reel-wrap::before,.reel-wrap::after{content:'';position:absolute;top:0;bottom:0;width:70px;z-index:2;pointer-events:none}
  .reel-wrap::before{left:0;background:linear-gradient(90deg,var(--ink),transparent)}
  .reel-wrap::after{right:0;background:linear-gradient(270deg,var(--ink),transparent)}
  .reel-marker{position:absolute;top:6px;bottom:6px;left:50%;width:2px;background:var(--accent);
    transform:translateX(-50%);z-index:4;pointer-events:none;box-shadow:0 0 10px 1px rgba(245,185,66,.7)}
  .reel-marker::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);
    border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid var(--accent)}
  .reel-marker::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
    border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:9px solid var(--accent)}
  .reel-track{display:flex;gap:12px;padding-left:0;will-change:transform}
  .reel-card{flex:0 0 130px;width:130px;background:var(--ink2);border:1px solid var(--line);
    border-radius:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .2s}
  .reel-card .rc-cov{height:76px;background:var(--surface2);display:grid;place-items:center;font-size:26px}
  .reel-card .rc-cov img{width:100%;height:100%;object-fit:cover}
  .reel-card .rc-t{font-size:12px;font-weight:600;padding:7px 8px;line-height:1.2;height:42px;overflow:hidden}

/* ---------------- localStorage shim (замена window.storage для обычного хостинга) ----------------
   Повторяет API window.storage (get/set/delete/list), но хранит всё в localStorage браузера.
   Данные привязаны к конкретному устройству/браузеру, а не к аккаунту — это ок для личного использования.
   "shared" данные (публичные профили сообщества) тоже остаются локальными: на обычном статическом
   хостинге нет сервера, который мог бы синхронизировать их между разными людьми/устройствами. */
window.storage = (function(){
  const NS = 'gamevault::';
  function fullKey(key, shared){ return NS + (shared ? 'shared::' : 'priv::') + key; }
  return {
    async get(key, shared){
      const raw = localStorage.getItem(fullKey(key, shared));
      if(raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      try{ localStorage.setItem(fullKey(key, shared), value); }
      catch(e){ console.error('localStorage set failed', e); return null; }
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      const k = fullKey(key, shared);
      const existed = localStorage.getItem(k) !== null;
      localStorage.removeItem(k);
      return { key, deleted: existed, shared: !!shared };
    },
    async list(prefix, shared){
      const base = NS + (shared ? 'shared::' : 'priv::');
      const p = base + (prefix || '');
      const keys = [];
      for(let i=0; i<localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && k.indexOf(p) === 0) keys.push(k.slice(base.length));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();

const AVATARS = ['🎮','👾','🕹️','🎯','🏆','🐉','⚔️','🛸','🍄','💀','🦊','🤖'];

const TIERS = [
  { key:'S', label:'9.0+',    min:9.0, color:'var(--s)' },
  { key:'A', label:'8.0–8.9', min:8.0, color:'var(--a)' },
  { key:'B', label:'6.5–7.9', min:6.5, color:'var(--b)' },
  { key:'C', label:'5.0–6.4', min:5.0, color:'var(--c)' },
  { key:'D', label:'3.0–4.9', min:3.0, color:'var(--d)' },
  { key:'F', label:'0–2.9',   min:0.0, color:'var(--f)' },
];
function tierOf(score){ for(const t of TIERS){ if(score >= t.min) return t; } return TIERS[TIERS.length-1]; }
function tierColorVar(key){ return 'var(--'+key.toLowerCase()+')'; }

/* ---------------- Rendering ---------------- */

function esc(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

// Чипы-фильтры по статусу со счётчиками. active — текущий выбранный ('all' или статус).
function statusChipsHTML(list, active){
  const S = statusList();
  const counts = {}; S.forEach(s=>counts[s]=0);
  list.forEach(g=>{ if(counts[g.status]!==undefined) counts[g.status]++; });
  let chips = `<button class="chip ${active==='all'?'active':''}" data-st="all">Все <b>${list.length}</b></button>`;
  S.forEach(s=>{
    const c = counts[s];
    chips += `<button class="chip ${active===s?'active':''} ${c===0?'zero':''}" data-st="${esc(s)}">
      <span class="dot" style="background:${statusColor(s)}"></span>${esc(s)} <b>${c}</b></button>`;
  });
  return `<div class="chips">${chips}</div>`;
}

function statsHTML(list){
  const count = list.length;
  const rated = list.filter(g => g.status === doneStatus());
  const avg = rated.length ? (rated.reduce((a,g)=>a+g.score,0)/rated.length) : 0;
  const tierIdx = k => TIERS.findIndex(t=>t.key===k);
  const topTier = rated.length ? rated.reduce((best,g)=>{ const k=tierOf(g.score).key; return tierIdx(k) < tierIdx(best) ? k : best; }, 'F') : '—';
  const played = rated.length;
  return `
    <div class="stat"><div class="num">${count}</div><div class="lab">Обзоров</div></div>
    <div class="stat"><div class="num">${rated.length?avg.toFixed(1):'—'}</div><div class="lab">Средний балл</div></div>
    <div class="stat"><div class="num">${topTier}</div><div class="lab">Высший тир</div></div>
    <div class="stat"><div class="num">${played}</div><div class="lab">${esc(L().statPlayed)}</div></div>`;
}

// Одна карточка игры. opts: {readonly, showStatus, statusDot, noReviewTag}
function cardHTML(g, opts){

  const t = tierOf(g.score);
  const scoreColor = g.cover ? '#fff' : t.color;
  const cover = g.cover ? `<div class="cov"><img src="${esc(g.cover)}" alt="" loading="lazy" onerror="this.closest('.cov').style.display='none';this.closest('.card').classList.remove('has-cover')"></div>` : '';
  let tags = '';
  if(opts.showStatus !== false && g.status){
    const dot = opts.statusDot ? `<span class="sdot" style="background:${statusColor(g.status)}"></span>` : '';
    tags += `<div class="cstatus">${dot}${esc(g.status)}</div>`;
  }
  if(opts.noReviewTag && !(g.review && g.review.trim())){
    tags += `<div class="cstatus noreview">без обзора</div>`;
  }
  return `<div class="card ${g.cover?'has-cover':''}" data-id="${g.id}" data-ro="${opts.readonly?1:0}">
    ${cover}
    <div class="card-body">
      <div class="cs" style="color:${scoreColor}">${g.score.toFixed(1)}</div>
      <div class="ct">${esc(g.title)}</div>
      ${g.genre?`<div class="cg">${esc(g.genre)}</div>`:''}
      ${tags}
    </div>
  </div>`;
}

// Тир-борд для любого списка игр. readonly=true — без кликов на редактирование.
// hideEmpty=true — прятать тиры без совпадений (для режима поиска).
function tierBoardHTML(list, readonly, hideEmpty){
  if(list.length === 0){
    return `<div class="empty-all"><b>Здесь пока пусто</b>${readonly?esc(L().friendEmpty):esc(L().firstReview)}</div>`;
  }
  let html = '';
  for(const t of TIERS){
    const inTier = list.filter(g=>tierOf(g.score).key===t.key).sort((a,b)=>b.score-a.score);
    if(hideEmpty && inTier.length===0) continue;
    html += `<div class="tier">
      <div class="tier-badge" style="background:${t.color}"><span>${t.key}</span><small>${t.label}</small></div>

    } else {

  }
  return html;
}

// Универсальная отрисовка доски в элемент el.
// opts: {readonly, query, status}. Без поиска и со status='all' — секционный вид.
function fillBoard(el, list, opts){
  opts = opts || {};
  const readonly = !!opts.readonly;
  const status = opts.status || 'all';
  const q = (opts.query||'').trim().toLowerCase();
  if(!el) return;
  if(list.length === 0){ el.innerHTML = tierBoardHTML([], readonly); return; }

  // --- Сфокусированный режим: активен поиск или выбран конкретный статус ---
  if(q || status !== 'all'){
    let base = status==='all' ? list : list.filter(g=>g.status===status);
    const filtered = q ? base.filter(g => g.title.toLowerCase().includes(q) || (g.genre||'').toLowerCase().includes(q)) : base;
    if(filtered.length === 0){
      const msg = q
        ? `<b>Ничего не найдено</b>По запросу «${esc(opts.query.trim())}»${status!=='all'?` среди «${esc(status)}»`:''} игр нет.`
        : `<b>Пусто</b>Нет игр со статусом «${esc(status)}».`;
      el.innerHTML = `<div class="empty-all">${msg}</div>`;
      return;
    }
    el.innerHTML = `<div class="search-count">Показано: ${filtered.length}</div>` + tierBoardHTML(filtered, readonly, true);
    wireCards(el, list, readonly, opts.onBack);
    return;
  }

  // --- Секционный вид по умолчанию ---
  const backl = backlogStatuses();
  const playing   = list.filter(g=>g.status===activeStatus());
  const completed  = list.filter(g=>g.status===doneStatus());
  const backlog   = list.filter(g=>backl.includes(g.status));
  let html = '';

  if(playing.length){
    html += `<div class="now-playing">
      <div class="block-head"><span class="np-live"></span><h3>${esc(L().nowPlaying)}</h3><span class="cnt">${playing.length}</span></div>
      <div class="block-grid">${playing.map(g=>cardHTML(g,{readonly,showStatus:false,noReviewTag:true})).join('')}</div>
    </div>`;
  }

  html += `<div class="section-label">${esc(L().ranking)}</div>`;
  if(completed.length){
    html += tierBoardHTML(completed, readonly, false);
  } else {
    html += `<div class="empty-all" style="padding:28px 20px"><b>${esc(L().emptyCompletedTitle)}</b>${readonly?esc(L().emptyCompletedFriend):esc(L().emptyCompletedSelf)}</div>`;
  }

  if(backlog.length){
    html += `<div class="section-label">Полка на потом</div>
      <div class="backlog">
        <div class="block-head"><h3 style="font-size:16px">Отложено · заброшено · в планах</h3>
          ${readonly?'':`<button class="btn sm" id="rouletteBtn" style="margin-left:auto">${esc(L().rouletteBtn)}</button>`}
          <span class="cnt" style="margin-left:${readonly?'auto':'12px'}">${backlog.length}</span></div>
        <div class="block-grid">${backlog.map(g=>cardHTML(g,{readonly,statusDot:true})).join('')}</div>
      </div>`;
  }

  el.innerHTML = html;
  wireCards(el, list, readonly, opts.onBack);
  const rb = el.querySelector('#rouletteBtn');
  if(rb) rb.addEventListener('click', openRoulette);
}

function wireCards(el, list, readonly, onBack){
  el.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click', ()=>openDetail(c.dataset.id, list, readonly, onBack));
  });
}

// Разбор ссылки на YouTube → {id, start(сек)} или null
function parseYouTube(url){
  if(!url) return null;
  let s = url.trim();
  if(!/^https?:\/\//i.test(s)) s = 'https://' + s;
  try{
    const u = new URL(s);
    let id = '';
    if(u.hostname.includes('youtu.be')) id = u.pathname.slice(1);
    else if(u.searchParams.get('v')) id = u.searchParams.get('v');
    else if(u.pathname.includes('/embed/')) id = u.pathname.split('/embed/')[1];
    else if(u.pathname.includes('/shorts/')) id = u.pathname.split('/shorts/')[1];
    id = (id||'').split(/[/?&#]/)[0];
    if(!id) return null;
    let start = 0;
    const t = u.searchParams.get('t') || u.searchParams.get('start');
    if(t){
      if(/^\d+$/.test(t)) start = parseInt(t);
      else { const h=t.match(/(\d+)h/), m=t.match(/(\d+)m/), sec=t.match(/(\d+)s/);
        start = (h?+h[1]*3600:0)+(m?+m[1]*60:0)+(sec?+sec[1]:0); }
    }
    return { id, start };
  }catch(e){ return null; }
}

// Точка на окружности: угол в градусах от верха, по часовой стрелке
function wheelPolar(cx, cy, r, deg){
  const t = deg * Math.PI / 180;
  return { x: cx + r*Math.sin(t), y: cy - r*Math.cos(t) };
}

function truncTitle(s, n){ s = s || ''; return s.length > n ? s.slice(0, n-1) + '…' : s; }

// Содержимое центра колеса по конфигу
function centerInner(cfg){
  if(!cfg || cfg.type==='none') return '';
  if(cfg.type==='emoji') return `<span class="wc-emoji">${esc(cfg.value||'💃')}</span>`;
  if(cfg.type==='shape') return `<span class="wc-shape"></span>`;
  if(cfg.type==='image') return cfg.value ? `<img class="wc-img" src="${esc(cfg.value)}" alt="" onerror="this.style.display='none'">` : '';
  return '';
}

// Строит SVG-колесо: по сегменту на игру из пула
function buildWheelSVG(pool){
  const N = pool.length;
  const cx = 150, cy = 150, R = 142, labelR = 92;
  if(N === 1){
    const g = pool[0];
    return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="${statusColor(g.status)}" stroke="var(--ink)" stroke-width="2"/>
      <text x="${cx}" y="${cy-40}" text-anchor="middle" font-size="13" font-family="'Hanken Grotesk',sans-serif" font-weight="700" fill="#12121a">${esc(truncTitle(g.title,16))}</text>
      <circle cx="${cx}" cy="${cy}" r="17" fill="var(--ink2)" stroke="var(--accent)" stroke-width="2"/>
    </svg>`;
  }
  const seg = 360 / N;
  let paths = '', labels = '';
  for(let i=0;i<N;i++){
    const a0 = i*seg, a1 = (i+1)*seg;
    const p0 = wheelPolar(cx,cy,R,a0), p1 = wheelPolar(cx,cy,R,a1);
    const large = seg > 180 ? 1 : 0;
    const g = pool[i];
    const col = statusColor(g.status);
    paths += `<path d="M${cx} ${cy} L${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A${R} ${R} 0 ${large} 1 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} Z" fill="${col}" stroke="var(--ink)" stroke-width="1.5"/>`;
    const mid = a0 + seg/2;
    const lp = wheelPolar(cx,cy,labelR,mid);
    let rot = mid; if(mid > 90 && mid < 270) rot += 180;   // переворот подписи в нижней половине
    const fs = N > 18 ? 8 : (N > 12 ? 9.5 : 11);
    const maxCh = N > 18 ? 7 : (N > 12 ? 10 : 14);
    labels += `<text x="${lp.x.toFixed(2)}" y="${lp.y.toFixed(2)}" transform="rotate(${rot.toFixed(1)} ${lp.x.toFixed(2)} ${lp.y.toFixed(2)})" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" font-family="'Hanken Grotesk',sans-serif" font-weight="600" fill="#12121a">${esc(truncTitle(g.title, maxCh))}</text>`;
  }
  return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--ink2)"/>
    ${paths}${labels}
    <circle cx="${cx}" cy="${cy}" r="17" fill="var(--ink2)" stroke="var(--accent)" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="var(--accent)"/>
  </svg>`;
}

function openRoulette(){
  const backl = backlogStatuses();
  const backlog = games.filter(g=>backl.includes(g.status));
  const present = backl.filter(s=>backlog.some(g=>g.status===s));
  const enabled = new Set(present);       // по умолчанию включены все имеющиеся статусы
  let spinning = false;
  let rotation = 0;                        // накопленный угол поворота (всегда растёт → по часовой)

  showModal(`
    <button class="close" onclick="__close()">×</button>
    <h3>${esc(L().rouletteTitle)}</h3>
    <p class="comm-note">Выбери, откуда тянуть, задай длительность и крути колесо.</p>
    <div class="rl-picks" id="rlPicks">
      ${backl.map(s=>{
        const cnt = backlog.filter(g=>g.status===s).length;
        return `<button class="chip ${enabled.has(s)?'active':''} ${cnt===0?'zero':''}" data-st="${esc(s)}" ${cnt===0?'disabled':''}>
          <span class="dot" style="background:${statusColor(s)}"></span>${esc(s)} <b>${cnt}</b></button>`;
      }).join('')}
    </div>
    <div class="rl-controls">
      <span>Время вращения:</span>
      <input type="number" id="spinSecs" class="rl-secs" value="5" min="1" max="30" step="1">
      <span>сек</span>
    </div>
    <div class="rl-music">
      <span class="mnote">🎵</span>
      <input type="text" id="musicUrl" placeholder="Ссылка на YouTube для музыки (необязательно)" value="${esc(musicUrl)}" autocomplete="off">
    </div>
    <div class="rl-center-pick" id="centerPick">
      <span class="lbl">Центр</span>
      ${CENTER_EMOJI.map(e=>`<button class="cbtn ${centerCfg.type==='emoji'&&centerCfg.value===e?'sel':''}" data-type="emoji" data-val="${e}">${e}</button>`).join('')}
      <button class="cbtn ${centerCfg.type==='shape'?'sel':''}" data-type="shape" title="Вращающаяся фигура"><span class="mini-shape"></span></button>
      <button class="cbtn ${centerCfg.type==='image'?'sel':''}" data-type="image" title="Своя GIF/картинка">🔗</button>
      <button class="cbtn ${centerCfg.type==='none'?'sel':''}" data-type="none" title="Пусто">✕</button>
      <div class="center-img-row ${centerCfg.type==='image'?'show':''}" id="centerImgRow">
        <input type="text" id="centerImg" placeholder="Ссылка на GIF или картинку" value="${centerCfg.type==='image'?esc(centerCfg.value||''):''}" autocomplete="off">
      </div>
    </div>
    <div class="wheel-wrap" id="wheelWrap">
      <div class="wheel-pointer"></div>
      <div class="wheel-rot" id="wheelRot"></div>
      <div class="wheel-center" id="wheelCenter"></div>
    </div>
    <div class="rl-result" id="rlResult"></div>
    <div class="form-actions">
      <button class="btn" id="spinBtn" style="flex:1">Крутить</button>
    </div>
    <div class="yt-host" id="ytHost"></div>
  `);

  const wheelRot = document.getElementById('wheelRot');
  const spinBtn = document.getElementById('spinBtn');
  const resultEl = document.getElementById('rlResult');
  const picksEl = document.getElementById('rlPicks');
  const secsInp = document.getElementById('spinSecs');
  const musicInp = document.getElementById('musicUrl');
  const ytHost = document.getElementById('ytHost');
  const centerEl = document.getElementById('wheelCenter');
  const centerPick = document.getElementById('centerPick');
  const centerImgRow = document.getElementById('centerImgRow');
  const centerImgInp = document.getElementById('centerImg');

  function renderCenter(){ centerEl.innerHTML = centerInner(centerCfg); }

  centerPick.querySelectorAll('.cbtn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const type = b.dataset.type;
      if(type==='emoji') centerCfg = { type:'emoji', value:b.dataset.val };
      else if(type==='shape') centerCfg = { type:'shape' };
      else if(type==='none') centerCfg = { type:'none' };
      else if(type==='image') centerCfg = { type:'image', value:(centerImgInp.value.trim()||'') };
      centerPick.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      centerImgRow.classList.toggle('show', type==='image');
      saveCenterCfg(centerCfg); renderCenter();
    });
  });
  centerImgInp.addEventListener('input', ()=>{
    if(centerCfg.type==='image'){ centerCfg.value = centerImgInp.value.trim(); saveCenterCfg(centerCfg); renderCenter(); }
  });

  musicInp.addEventListener('change', ()=>{ musicUrl = musicInp.value.trim(); saveMusicUrl(musicUrl); });

  function startMusic(){
    const yt = parseYouTube(musicInp.value);
    if(!yt){ ytHost.innerHTML=''; return; }
    ytHost.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(yt.id)}?autoplay=1&start=${yt.start}&controls=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  }
  function stopMusic(){ ytHost.innerHTML=''; }

  const currentPool = ()=>games.filter(g=>enabled.has(g.status));

  function buildWheel(){
    const pool = currentPool();
    wheelRot.innerHTML = pool.length
      ? buildWheelSVG(pool)
      : `<div class="wheel-empty">Выбери хотя бы один статус, чтобы собрать колесо</div>`;
  }

  picksEl.querySelectorAll('.chip:not([disabled])').forEach(ch=>{
    ch.addEventListener('click', ()=>{
      if(spinning) return;
      const s = ch.dataset.st;
      if(enabled.has(s)) enabled.delete(s); else enabled.add(s);
      ch.classList.toggle('active', enabled.has(s));
      resultEl.innerHTML = '';
      buildWheel();
    });
  });

  function spin(){
    if(spinning) return;
    const pool = currentPool();
    if(pool.length === 0){ resultEl.innerHTML = `<div class="rl-hint">Выбери хотя бы один статус для розыгрыша.</div>`; return; }
    spinning = true; spinBtn.disabled = true; resultEl.innerHTML = '';

    let secs = parseFloat(secsInp.value);
    if(!isFinite(secs)) secs = 5;
    secs = Math.max(1, Math.min(30, secs));
    secsInp.value = secs;

    const N = pool.length;
    const seg = 360 / N;
    const winIdx = Math.floor(Math.random()*N);
    const winner = pool[winIdx];

    // центр выигрышного сегмента (от верха, по часовой) с небольшим разбросом внутри сегмента
    const center = winIdx*seg + seg/2;
    const jitter = (Math.random()-0.5) * seg * 0.7;
    const targetMod = (((-(center + jitter)) % 360) + 360) % 360;   // сколько должно остаться по модулю
    const curMod = ((rotation % 360) + 360) % 360;
    const turns = 6;
    const advance = turns*360 + (((targetMod - curMod) % 360) + 360) % 360;
    rotation += advance;

    startMusic();
    centerEl.classList.add('dancing');
    requestAnimationFrame(()=>{
      wheelRot.style.transition = `transform ${secs}s cubic-bezier(0.15,0.68,0.10,1)`;
      wheelRot.style.transform = `rotate(${rotation}deg)`;
    });

    const onEnd = ()=>{
      wheelRot.removeEventListener('transitionend', onEnd);
      stopMusic();
      centerEl.classList.remove('dancing');
      spinning = false; spinBtn.disabled = false; spinBtn.textContent = 'Крутить снова';
      resultEl.innerHTML = `<div class="rl-win">
          <div class="rl-win-lab mono">Выпало</div>
          <div class="rl-win-name">${esc(winner.title)}</div>
          <div class="rl-win-meta">${esc([winner.genre, winner.status].filter(Boolean).join(' · '))}</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
            <button class="btn ghost sm" id="rlOpen">Открыть обзор</button>
            <button class="btn ghost sm" id="rlFriends">Обзоры друзей</button>
          </div>
          <div id="rlFriendsList"></div>
        </div>`;
      const ob = document.getElementById('rlOpen');
      if(ob) ob.addEventListener('click', ()=>openDetail(winner.id, games, false, openRoulette, '← Назад к рулетке'));
      const fbtn = document.getElementById('rlFriends');
      if(fbtn) fbtn.addEventListener('click', ()=>showFriendReviews(fbtn, winner.title));
    };
    wheelRot.addEventListener('transitionend', onEnd);
  }

  // Ищет игру по названию у всех опубликованных друзей и показывает их оценки/обзоры
  async function showFriendReviews(btn, title){
    const box = document.getElementById('rlFriendsList');
    if(!box) return;
    btn.disabled = true;
    box.innerHTML = `<div class="rl-hint">Ищу у друзей…</div>`;
    const profiles = await listProfiles();
    const norm = s => (s||'').trim().toLowerCase();
    const wt = norm(title);
    const matches = [];
    profiles.forEach(p=>{
      if(myHandle && p.handle===myHandle) return;         // не показываем собственный опубликованный профиль
      const g = (p.items||[]).find(x=>norm(x.title)===wt);
      if(g) matches.push({p, g});
    });
    btn.disabled = false;
    if(matches.length === 0){
      box.innerHTML = `<div class="rl-hint">Пока никто из друзей не добавлял «${esc(title)}».</div>`;
      return;
    }
    box.innerHTML = `<div class="fr-list">` + matches.map(({p,g})=>{
      const t = tierOf(g.score);
      return `<div class="fr-item">
        <div class="fr-top">
          <span class="fr-av">${esc(p.avatar||'🎮')}</span>
          <span class="fr-name">${esc(p.name||'Игрок')} <span class="fr-handle">@${esc(p.handle)}</span></span>
          <span class="fr-score" style="color:${t.color}">${g.score.toFixed(1)}</span>
        </div>
        ${g.status?`<div class="fr-meta">${esc(g.status)} · тир ${t.key}</div>`:''}
        <div class="fr-review ${g.review?'':'empty'}">${g.review?esc(g.review):'Без обзора'}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  spinBtn.addEventListener('click', spin);
  buildWheel();
  renderCenter();
}

    <p class="comm-note">${esc(L().publishNote)}</p>

      ${myHandle?`<button class="btn ghost" id="unpubBtn" style="color:var(--s)">Убрать из витрины</button>`:`<button class="btn ghost" onclick="__close()">Отмена</button>`}
      <button class="btn" id="doPublish">${myHandle?'Обновить':'Опубликовать'}</button>

/* ---------------- Modal helpers ---------------- */
function showModal(inner){ modal.innerHTML = inner; overlay.classList.add('open'); }
function closeModal(){ overlay.classList.remove('open'); modal.innerHTML=''; }

// Двухшаговое подтверждение на кнопке (замена системного confirm, который блокируется в песочнице).
// Первый клик «взводит» кнопку, второй в течение 3.5с выполняет action.
function armButton(btn, confirmText, action){
  if(!btn) return;
  let armed = false, timer;
  const orig = btn.textContent;
  const reset = ()=>{ armed=false; btn.textContent=orig; btn.classList.remove('armed'); };
  btn.addEventListener('click', async ()=>{
    if(!armed){
      armed = true; btn.textContent = confirmText; btn.classList.add('armed');
      timer = setTimeout(reset, 3500);
      return;
    }
    clearTimeout(timer);
    await action();
  });
}

/* ---------------- Add / edit form ---------------- */
function openForm(editId){
  const g = editId ? games.find(x=>x.id===editId) : null;
  const initScore = g ? g.score : 7.5;
  const statusOpts = statusList().map(s=>`<option ${g&&g.status===s?'selected':''}>${s}</option>`).join('');
  showModal(`
    <button class="close" onclick="__close()">×</button>
    <h3>${g?'Редактировать обзор':'Новый обзор'}</h3>
    <label>${esc(L().nameLabel)} *</label>
    <input type="text" id="fTitle" value="${g?esc(g.title):''}" placeholder="${esc(L().namePlaceholder)}" maxlength="80">
    <div class="row2">
      <div><label>Жанр</label><input type="text" id="fGenre" value="${g?esc(g.genre||''):''}" placeholder="${esc(L().genrePlaceholder)}" maxlength="40"></div>
      <div><label>Статус</label><select id="fStatus">${statusOpts}</select></div>
    </div>
    <label>Оценка</label>
    <div class="score-wrap">
      <input type="range" id="fScore" min="0" max="10" step="0.1" value="${initScore}">
      <div class="score-badge" id="scoreBadge"></div>
    </div>
    <label>Обложка</label>
    <div class="cover-ctrl">
      <div class="cover-preview" id="coverPrev">нет обложки</div>
      <div class="cover-actions">
        <input type="text" id="fCoverUrl" placeholder="Вставь ссылку на картинку…">
        <div class="cover-btns">
          <button type="button" class="btn ghost sm" id="uploadBtn">Загрузить файл</button>
          <button type="button" class="btn ghost sm" id="clearCover">Убрать</button>
        </div>
        <input type="file" id="fCoverFile" accept="image/*" hidden>
      </div>
    </div>
    <label>Обзор</label>
    <textarea id="fReview" placeholder="Что понравилось, что нет, кому зайдёт…">${g?esc(g.review||''):''}</textarea>
    <div class="err" id="formErr"></div>
    <div class="form-actions">
      <button class="btn ghost" onclick="__close()">Отмена</button>
      <button class="btn" id="saveGame">${g?'Сохранить':'Опубликовать'}</button>
    </div>
  `);
  const scoreInp = document.getElementById('fScore');
  const badge = document.getElementById('scoreBadge');
  function upd(){
    const v = parseFloat(scoreInp.value);
    const t = tierOf(v);
    badge.innerHTML = `<span>${v.toFixed(1)}</span><span class="tl" style="background:${tierColorVar(t.key)}">${t.key}</span>`;
  }
  scoreInp.addEventListener('input', upd); upd();

  // ---- cover controls ----
  let currentCover = g && g.cover ? g.cover : '';
  const prev = document.getElementById('coverPrev');
  const urlInp = document.getElementById('fCoverUrl');
  const fileInp = document.getElementById('fCoverFile');
  function drawPrev(){
    if(currentCover){
      prev.innerHTML = `<img src="${esc(currentCover)}" alt="" onerror="this.parentNode.textContent='ссылка не открылась'">`;
    } else { prev.textContent = 'нет обложки'; }
  }
  if(currentCover && !currentCover.startsWith('data:')) urlInp.value = currentCover;
  drawPrev();
  urlInp.addEventListener('input', ()=>{ currentCover = urlInp.value.trim(); drawPrev(); });
  document.getElementById('uploadBtn').addEventListener('click', ()=>fileInp.click());
  document.getElementById('clearCover').addEventListener('click', ()=>{ currentCover=''; urlInp.value=''; drawPrev(); });
  fileInp.addEventListener('change', async ()=>{
    const f = fileInp.files[0]; if(!f) return;
    prev.textContent = 'обработка…';
    try{ currentCover = await downscaleImage(f); urlInp.value=''; drawPrev(); }
    catch(e){ prev.textContent='не удалось загрузить'; }
  });

  document.getElementById('saveGame').addEventListener('click', ()=>submitForm(editId, ()=>currentCover));
}

async function submitForm(editId, getCover){
  const title = document.getElementById('fTitle').value.trim();
  const err = document.getElementById('formErr');
  if(!title){ err.textContent='Впиши название игры.'; return; }
  const data = {
    title,
    genre: document.getElementById('fGenre').value.trim(),
    status: document.getElementById('fStatus').value,
    score: parseFloat(document.getElementById('fScore').value),
    review: document.getElementById('fReview').value.trim(),
    cover: getCover ? getCover() : '',
  };
  if(editId){
    const i = games.findIndex(x=>x.id===editId);
    if(i>-1) games[i] = {...games[i], ...data};
  } else {
    games.push({ id:'g_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), ...data, added:Date.now() });
  }
  await saveGames(games);
  closeModal(); render();
}

// Уменьшает загруженное изображение до компактного размера (для хранилища)
function downscaleImage(file, maxW=420){
  return new Promise((res,rej)=>{
    const rd = new FileReader();
    rd.onerror = rej;
    rd.onload = ()=>{
      const img = new Image();
      img.onerror = rej;
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        try{ res(c.toDataURL('image/jpeg',0.72)); }catch(e){ rej(e); }
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(file);
  });
}

function openDetail(id, list, readonly, onBack, backLabel){
  list = list || games;
  const g = list.find(x=>x.id===id); if(!g) return;
  const t = tierOf(g.score);
  const meta = [g.genre, g.status].filter(Boolean).join(' · ');
  showModal(`
    <button class="close" onclick="__close()">×</button>
    ${onBack?`<button class="btn ghost sm modal-back" id="backBtn">${esc(backLabel||'← Назад в профиль')}</button>`:''}
    ${g.cover?`<div class="rd-banner"><img src="${esc(g.cover)}" alt="" onerror="this.closest('.rd-banner').style.display='none'"></div>`:''}
    <div class="rd-head">
      <div>
        <h3 style="margin-bottom:2px">${esc(g.title)}</h3>
        <div class="rd-meta">${esc(meta)||'—'}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="rd-score" style="color:${t.color}">${g.score.toFixed(1)}</div>
        <div class="mono" style="font-size:12px;color:var(--muted)">тир ${t.key}</div>
      </div>
    </div>
    <div class="rd-body ${g.review?'':'empty'}">${g.review?esc(g.review):'Обзор пока не написан.'}</div>
    ${readonly ? '' : `<div class="rd-actions">
      <button class="btn ghost sm" id="editG">Редактировать</button>
      <button class="btn ghost sm" id="delG" style="color:var(--s)">Удалить</button>
    </div>`}
  `);
  if(onBack){ const bb=document.getElementById('backBtn'); if(bb) bb.addEventListener('click', onBack); }
  if(readonly) return;
  document.getElementById('editG').addEventListener('click', ()=>openForm(id));
  armButton(document.getElementById('delG'), 'Точно удалить?', async ()=>{
    games = games.filter(x=>x.id!==id);
    await saveGames(games); closeModal(); render();
  });
}
